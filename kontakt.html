<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kontakt – Delta sigma</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">
<link rel="stylesheet" href="baner.css">
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f0f2f5;
}


/* HERO */
.hero {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: white;
    padding: 10px 10px;
    text-align: center;
    max-height: 200px;
}

.hero h1 {
    margin: 0;
    font-weight: 400;
}

.hero p {
    margin-top: 10px;
    opacity: 0.9;
}

/* MAIN */
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* CONTACT INFO */
.contact-item {
    margin-bottom: 15px;
    font-size: 16px;
}

.contact-item strong {
    display: block;
    margin-bottom: 5px;
}

/* CTA BUTTONS */
.cta {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.cta a {
    flex: 1;
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    color: white;
    background: #1f2a36;
    transition: 0.3s;
}

.cta a:hover {
    transform: scale(1.05);
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-family: 'Poppins', sans-serif;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #1f2a36;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

/* HOURS */
.hours {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
}

/* MAP */
.map {
    margin-top: 20px;
    border-radius: 16px;
    overflow: hidden;
}

/* FOOTER */
footer {
    background: #1f2a36;
    color: #aaa;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
}

/* RESPONSIVE */
@media (max-width: 800px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div id="nav"></div>
<div id="baner"></div>
<div class="container">

<div class="grid">

<!-- LEWA: DANE -->
<div class="card">

    <h2>Dane kontaktowe</h2>

    <div class="contact-item">
        <strong>Telefon</strong>
        514 681 958
    </div>
    
    <div class="contact-item">
        <strong> Dane firmy</strong>
        Karol Musioł "Delta Sigma"
        <h3>NIP: 6452595325</h3>
    </div>

    <div class="hours">
        <strong>Dostępność:</strong><br>
        Pon–Pt: 8:00 – 20:00<br>
        Sob: 9:00 – 15:00
    </div>

    <div class="cta">
        <a href="tel:514681958">Zadzwoń</a>
        <a href="mailto:kontakt@deltasigma.pl">Napisz</a>
    </div>

</div>



<!-- MAPA -->
<div class="map">
    <iframe
        src="https://maps.google.com/maps?q=Wroc%C5%82aw&t=&z=12&ie=UTF8&iwloc=&output=embed"
        width="100%" height="300" style="border:0;">
    </iframe>
</div>

</div>

<footer>
    © 2026 Karol Musioł Delta sigma
</footer>

<script>
fetch("nav.html")
    .then(res => res.text())

    });
</script>
<script>
fetch("baner.html")
    .then(res => res.text())
    .then(html => {
        document.getElementById("baner").innerHTML = html;
    });
</script>
</body>
</html>
