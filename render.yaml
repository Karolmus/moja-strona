services:
  - type: web
    name: deltasigma-calculators
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python init_db.py &&
      gunicorn --workers 1 --threads 4 --timeout 30
      --max-requests 1000 --max-requests-jitter 100 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CALCULATORS_ENABLED
        value: "false"
      - key: RATE_LIMIT_ENABLED
        value: "true"
