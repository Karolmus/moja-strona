<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/webp" href="img/logo3.png">
<link rel="shortcut icon" type="image/webp" href="img/logo3.png">
<link rel="apple-touch-icon" href="img/logo3.png">
<title>Panel Admina</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<style>
:root {
    --page-bg: #f0f2f5;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --line: #d9e1ea;
    --line-dark: #111827;
    --text: #1f2a36;
    --muted: #64748b;
    --navy: #263545;
    --navy-hover: #1c2834;
    --blue-soft: #e8f1fb;
    --blue-text: #24527a;
    --green-soft: #e8f5e7;
    --green-text: #2f6b36;
    --red-soft: #fdecea;
    --red-text: #8b2119;
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--page-bg);
    color: var(--text);
}

.container {
    max-width: 1480px;
    margin: 28px auto;
    padding: 16px;
}

.page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
}

.page-header h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.2;
}

.admin-email {
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
}

.admin-layout {
    display: grid;
    grid-template-columns: 290px minmax(0, 1fr);
    gap: 14px;
    align-items: start;
}

.panel {
    display: grid;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: var(--shadow);
}

.panel h2 {
    margin: 0;
    font-size: 18px;
    line-height: 1.2;
}

.field {
    display: grid;
    gap: 4px;
}

label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
}

input,
select {
    width: 100%;
    min-height: 36px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    background: white;
    color: var(--text);
    font: inherit;
}

input:focus,
select:focus,
.level-card:focus-visible {
    outline: 3px solid rgba(88, 101, 242, 0.18);
    outline-offset: 1px;
    border-color: #b8d3ee;
}

.level-cards {
    display: grid;
    gap: 5px;
}

.level-card {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    color: var(--text);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 10px;
    text-align: left;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
}

.level-card.active {
    border-color: #b8d3ee;
    background: var(--blue-soft);
    color: var(--blue-text);
}

.btn {
    min-height: 34px;
    border: 1px solid var(--navy);
    border-radius: 8px;
    background: var(--navy);
    color: white;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    padding: 7px 11px;
}

.btn:hover {
    background: var(--navy-hover);
    border-color: var(--navy-hover);
}

.btn.secondary {
    background: white;
    border-color: var(--line);
    color: var(--text);
}

.btn.danger {
    background: var(--red-soft);
    border-color: #f3b7b0;
    color: var(--red-text);
}

.status-box {
    display: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    line-height: 1.45;
}

.status-box.active {
    display: block;
    border: 1px solid var(--line);
    background: var(--surface-soft);
}

.credentials-box {
    display: none;
    gap: 8px;
    border: 1px solid #cce5c9;
    border-radius: 8px;
    background: var(--green-soft);
    padding: 10px;
}

.credentials-box.active {
    display: grid;
}

.credentials-box h3 {
    margin: 0;
    color: var(--green-text);
    font-size: 14px;
}

.credential-row {
    display: grid;
    gap: 3px;
}

.credential-row span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
}

.credential-row strong {
    color: var(--text);
    font-size: 14px;
    overflow-wrap: anywhere;
}

.table-wrap {
    overflow: visible;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 980px;
}

th,
td {
    border-bottom: 1px solid var(--line);
    padding: 7px 7px;
    text-align: left;
    vertical-align: middle;
    font-size: 13px;
    overflow-wrap: anywhere;
}

th {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
}

.index-cell {
    width: 38px;
    color: var(--muted);
    font-weight: 600;
}

.col-index {
    width: 3%;
}

.col-student {
    width: 10%;
}

.col-login {
    width: 18%;
}

.col-created {
    width: 8%;
}

.col-level {
    width: 10%;
}

.col-status {
    width: 7%;
}

.col-progress {
    width: 16%;
}

.col-activity {
    width: 8%;
}

.col-actions {
    width: 20%;
}

.badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 600;
}

.badge.active {
    background: var(--green-soft);
    color: var(--green-text);
}

.badge.inactive {
    background: var(--red-soft);
    color: var(--red-text);
}

.actions {
    display: grid;
    gap: 6px;
}

.actions .btn {
    width: 100%;
    min-height: 30px;
    padding: 5px 8px;
    font-size: 11px;
    line-height: 1.15;
    white-space: nowrap;
}

.action-primary {
    display: grid;
}

.action-danger-group {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
    border: 1px solid #f3d2ce;
    border-radius: 8px;
    background: #fff7f6;
    padding: 6px;
}

.action-danger-group .btn:last-child {
    grid-column: 1 / -1;
}

.login-details {
    display: grid;
    gap: 5px;
}

.login-line {
    display: grid;
    gap: 2px;
}

.login-line span {
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
}

.login-line strong {
    color: var(--text);
    font-size: 12px;
    overflow-wrap: anywhere;
}

.login-line strong.missing {
    color: var(--muted);
    font-weight: 600;
}

.mini-link {
    justify-self: start;
    border: 0;
    background: transparent;
    color: var(--blue-text);
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 0;
}

.mini-link:hover {
    text-decoration: underline;
}

.progress-cell {
    display: grid;
    gap: 7px;
}

.progress-mini-row {
    display: grid;
    gap: 4px;
}

.progress-mini-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
}

.progress-mini-track {
    height: 7px;
    overflow: hidden;
    border-radius: 999px;
    background: #e2e8f0;
}

.progress-mini-fill {
    display: block;
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #6aa84f, #8fcf74);
}

.progress-mini-fill.exam {
    background: linear-gradient(90deg, #24527a, #5d8fbd);
}

.progress-text,
.work-time {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.3;
}

.pace-badge {
    display: inline-flex;
    width: fit-content;
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 10px;
    font-weight: 600;
}

.pace-badge.ok {
    background: var(--green-soft);
    color: var(--green-text);
}

.pace-badge.watch {
    background: #fff4cf;
    color: #765a12;
}

.pace-badge.missing {
    background: var(--red-soft);
    color: var(--red-text);
}

.review-count {
    width: fit-content;
    border-radius: 999px;
    background: #fff4cf;
    color: #765a12;
    padding: 3px 7px;
    font-size: 10px;
    font-weight: 600;
}

.progress-detail {
    display: none;
    gap: 14px;
    border-top: 1px solid var(--line);
    margin-top: 8px;
    padding-top: 14px;
}

.progress-detail.active {
    display: grid;
}

.progress-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
}

.progress-heading h3 {
    margin: 0;
    font-size: 16px;
}

.chart-legend {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
}

.work-summary {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
}

.work-summary-item {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    background: var(--surface-soft);
}

.work-summary-item span {
    display: block;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
}

.work-summary-item strong {
    display: block;
    margin-top: 3px;
    color: var(--text);
    font-size: 15px;
}

.review-tasks {
    display: grid;
    gap: 8px;
}

.review-tasks h4 {
    margin: 0;
    font-size: 14px;
}

.review-empty {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    color: var(--muted);
    padding: 10px;
    font-size: 12px;
}

.review-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    border: 1px solid #edd88c;
    border-radius: 8px;
    background: #fffaf0;
    padding: 10px;
}

.review-main {
    display: grid;
    gap: 3px;
}

.review-main strong {
    font-size: 13px;
}

.review-meta {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.35;
}

.legend-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
}

.legend-dot.good,
.bar-segment.good {
    background: #57a663;
}

.legend-dot.medium,
.bar-segment.medium {
    background: #e3bd41;
}

.legend-dot.bad,
.bar-segment.bad {
    background: #d95b50;
}

.activity-chart {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(54px, 1fr);
    align-items: end;
    gap: 10px;
    min-height: 210px;
    overflow-x: auto;
    padding: 10px 2px 4px;
}

.day-column {
    display: grid;
    justify-items: center;
    align-items: end;
    gap: 6px;
    min-width: 54px;
}

.stacked-bar {
    width: 32px;
    display: flex;
    flex-direction: column-reverse;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 7px 7px 4px 4px;
    background: #eef2f7;
}

.bar-segment {
    width: 100%;
    min-height: 2px;
}

.day-total {
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
}

.day-label {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.15;
    text-align: center;
}

.recent-progress {
    display: grid;
    gap: 6px;
    max-height: 240px;
    overflow: auto;
}

.recent-row {
    display: grid;
    grid-template-columns: 120px minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
}

.result-pill {
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 11px;
    font-weight: 600;
}

.result-pill.good {
    background: var(--green-soft);
    color: var(--green-text);
}

.result-pill.medium {
    background: #fff4cf;
    color: #765a12;
}

.result-pill.bad {
    background: var(--red-soft);
    color: var(--red-text);
}

footer {
    text-align: center;
    padding: 15px;
    background: #1f2a36;
    color: #aaa;
    margin-top: 40px;
}

@media(max-width: 900px) {
    .admin-layout {
        grid-template-columns: 1fr;
    }
}

@media(max-width: 760px) {
    .container {
        margin: 24px auto;
        padding: 5px;
    }

    .page-header h1 {
        font-size: 24px;
    }

    .recent-row {
        grid-template-columns: 1fr;
    }

    .work-summary {
        grid-template-columns: 1fr;
    }

    .review-item {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<nav class="main-nav" aria-label="Główna nawigacja">
    <a href="index.html">Strona główna</a>
    <a href="zadania.html">Strefa ucznia</a>
    <a href="kalkulatory.html">Kalkulatory</a>
    <a href="login.html" data-auth-login>Logowanie</a>
    <span class="nav-user" data-auth-user hidden></span>
    <button class="nav-logout" type="button" data-auth-logout hidden>Wyloguj</button>
</nav>

<main class="container">
    <header class="page-header">
        <div>
            <h1>Panel Admina</h1>
            <div class="admin-email" id="adminEmail">Sprawdzam sesję...</div>
        </div>
        <button class="btn secondary" type="button" id="logoutBtn">Wyloguj</button>
    </header>

    <div class="admin-layout">
        <form class="panel" id="studentForm">
            <h2>Dodaj ucznia</h2>

            <div class="field">
                <label for="displayName">Imię i nazwisko</label>
                <input id="displayName" name="display_name" required maxlength="120">
            </div>

            <div class="field">
                <label for="studentEmail">E-mail / login</label>
                <input id="studentEmail" name="email" type="email" required maxlength="254" autocomplete="off">
            </div>

            <div class="field">
                <label>Poziom</label>
                <input type="hidden" id="studentLevel" name="level" value="matura_podstawowa">
                <div class="level-cards" aria-label="Poziom ucznia">
                    <button class="level-card active" type="button" data-level="matura_podstawowa">Matura podstawowa</button>
                    <button class="level-card" type="button" data-level="matura_rozszerzona">Matura rozszerzona</button>
                    <button class="level-card" type="button" data-level="egzamin_osmoklasisty">Egzamin Ósmoklasisty</button>
                </div>
            </div>

            <div class="field">
                <label for="studentPassword">Hasło startowe</label>
                <input id="studentPassword" name="password" minlength="8" maxlength="128" autocomplete="new-password" placeholder="Puste = wygeneruj automatycznie">
            </div>

            <button class="btn" type="submit">Dodaj ucznia</button>
            <div class="credentials-box" id="credentialsBox" aria-live="polite">
                <h3 id="credentialsTitle">Dane logowania ucznia</h3>
                <div class="credential-row">
                    <span>Login</span>
                    <strong id="credentialsLogin"></strong>
                </div>
                <div class="credential-row">
                    <span>Hasło</span>
                    <strong id="credentialsPassword"></strong>
                </div>
                <button class="btn secondary" type="button" id="copyCredentialsBtn">Kopiuj dane</button>
            </div>
            <div class="status-box" id="adminStatus" role="status" aria-live="polite"></div>
        </form>

        <section class="panel">
            <h2>Uczniowie i postępy</h2>
            <div class="table-wrap">
                <table>
                    <colgroup>
                        <col class="col-index">
                        <col class="col-student">
                        <col class="col-login">
                        <col class="col-created">
                        <col class="col-level">
                        <col class="col-status">
                        <col class="col-progress">
                        <col class="col-activity">
                        <col class="col-actions">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Nr</th>
                            <th>Uczeń</th>
                            <th>Dane logowania</th>
                            <th>Dodano</th>
                            <th>Poziom</th>
                            <th>Status</th>
                            <th>Postęp</th>
                            <th>Ostatnia aktywność</th>
                            <th>Akcje</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>

            <div class="progress-detail" id="progressDetail" aria-live="polite">
                <div class="progress-heading">
                    <h3 id="progressTitle">Postępy ucznia</h3>
                    <button class="btn secondary" type="button" id="closeProgressBtn">Zamknij</button>
                </div>

                <div class="chart-legend">
                    <span class="legend-item"><span class="legend-dot good"></span>Dobrze</span>
                    <span class="legend-item"><span class="legend-dot medium"></span>Z pomocą</span>
                    <span class="legend-item"><span class="legend-dot bad"></span>Źle</span>
                </div>

                <div class="work-summary" id="workSummary"></div>
                <div class="review-tasks" id="reviewTasks"></div>
                <div class="activity-chart" id="activityChart"></div>
                <div class="recent-progress" id="recentProgress"></div>
            </div>
        </section>
    </div>
</main>

<footer>© 2026 Delta sigma</footer>
<div class="footer-contact" aria-label="Kontakt"><a href="kontakt.html">Kontakt</a></div>

<script src="static/auth.js?v=20260518-token"></script>
<script>
const levelLabels = {
    matura_podstawowa: "Matura podstawowa",
    matura_rozszerzona: "Matura rozszerzona",
    egzamin_osmoklasisty: "Egzamin Ósmoklasisty"
};

const ADMIN_TASK_SOURCES = [
    { path: "zadania/mp/2025/maj/2025_cke_p_m.json", category: "egzaminy", level: "matura_podstawowa", label: "Matura podstawowa", detail: "2025 / maj / CKE" },
    { path: "zadania/mr/2025/maj/2025_cke_r_m.json", category: "egzaminy", level: "matura_rozszerzona", label: "Matura rozszerzona", detail: "2025 / maj / CKE" },
    { path: "zadania/eo/2025/maj/2025_cke_o_m.json", category: "egzaminy", level: "egzamin_osmoklasisty", label: "Egzamin Ósmoklasisty", detail: "2025 / maj / CKE" },
    { path: "zadania/kurs/mp/zadania_kurs_mp.json", category: "kurs", level: "matura_podstawowa", label: "Kurs", detail: "Matura podstawowa" },
    { path: "zadania/kurs/mr/zadania_kurs_mr.json", category: "kurs", level: "matura_rozszerzona", label: "Kurs", detail: "Matura rozszerzona" },
    { path: "zadania/kurs/eo/zadania_kurs_eo.json", category: "kurs", level: "egzamin_osmoklasisty", label: "Kurs", detail: "Egzamin Ósmoklasisty" },
    { path: "zadania/kurs/eo/lekcja_2/lekcja_2_dzialania_na_liczbach.json", category: "kurs", level: "egzamin_osmoklasisty", label: "Lekcja 2", detail: "Działania na liczbach" }
];

const COURSE_TARGETS = {
    matura_podstawowa: 20,
    matura_rozszerzona: 20,
    egzamin_osmoklasisty: 20
};

const EXAM_TARGETS = {
    matura_podstawowa: 20,
    matura_rozszerzona: 20,
    egzamin_osmoklasisty: 20
};

const adminEmail = document.getElementById("adminEmail");
const studentForm = document.getElementById("studentForm");
const studentTable = document.getElementById("studentTable");
const adminStatus = document.getElementById("adminStatus");
const progressDetail = document.getElementById("progressDetail");
const progressTitle = document.getElementById("progressTitle");
const workSummary = document.getElementById("workSummary");
const reviewTasks = document.getElementById("reviewTasks");
const activityChart = document.getElementById("activityChart");
const recentProgress = document.getElementById("recentProgress");
const credentialsBox = document.getElementById("credentialsBox");
const credentialsTitle = document.getElementById("credentialsTitle");
const credentialsLogin = document.getElementById("credentialsLogin");
const credentialsPassword = document.getElementById("credentialsPassword");
const copyCredentialsBtn = document.getElementById("copyCredentialsBtn");
const studentLevelInput = document.getElementById("studentLevel");
const levelCards = document.querySelectorAll(".level-card");

let students = [];
let lastCredentialsText = "";
let adminTaskCatalog = [];
let studentProgressCache = new Map();
let activeProgressStudentId = null;
const ISSUED_CREDENTIALS_KEY = "deltaSigmaIssuedStudentCredentials";

function showStatus(message){
    adminStatus.classList.add("active");
    adminStatus.innerText = message;
}

function showCredentials(title, student, password){
    lastCredentialsText = `Login: ${student.email}\nHasło: ${password}`;

    credentialsTitle.innerText = title;
    credentialsLogin.innerText = student.email;
    credentialsPassword.innerText = password;
    credentialsBox.classList.add("active");
}

function loadIssuedCredentials(){
    try {
        return JSON.parse(window.localStorage.getItem(ISSUED_CREDENTIALS_KEY)) || {};
    } catch(error) {
        return {};
    }
}

function saveIssuedCredentials(credentials){
    window.localStorage.setItem(ISSUED_CREDENTIALS_KEY, JSON.stringify(credentials));
}

function rememberIssuedPassword(student, password){
    if(!student?.id || !password) return;

    const credentials = loadIssuedCredentials();

    credentials[String(student.id)] = {
        email: student.email,
        password
    };

    saveIssuedCredentials(credentials);
}

function forgetIssuedPassword(studentId){
    const credentials = loadIssuedCredentials();

    delete credentials[String(studentId)];
    saveIssuedCredentials(credentials);
}

function getIssuedPassword(student){
    const item = loadIssuedCredentials()[String(student.id)];

    if(!item || item.email !== student.email){
        return "";
    }

    return item.password || "";
}

async function copyLastCredentials(){
    if(!lastCredentialsText) return;

    try {
        await navigator.clipboard.writeText(lastCredentialsText);
        showStatus("Skopiowano dane logowania ucznia.");
    } catch(error) {
        showStatus(lastCredentialsText);
    }
}

function formatDate(value){
    if(!value) return "brak";

    return new Date(value).toLocaleString("pl-PL", {
        dateStyle: "short",
        timeStyle: "short"
    });
}

function formatShortDate(value){
    return new Date(value).toLocaleDateString("pl-PL", {
        day: "2-digit",
        month: "2-digit"
    });
}

function formatDateOnly(value){
    if(!value) return "brak";

    return new Date(value).toLocaleDateString("pl-PL", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
    });
}

function dayKey(value){
    const date = new Date(value);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");

    return `${year}-${month}-${day}`;
}

function resultLabel(result){
    const labels = {
        good: "Dobrze",
        medium: "Z pomocą",
        bad: "Źle"
    };

    return labels[result] || result;
}

function formatDuration(seconds){
    const value = Math.max(0, Number(seconds) || 0);
    const hours = Math.floor(value / 3600);
    const minutes = Math.floor((value % 3600) / 60);
    const rest = value % 60;

    if(hours) return `${hours} h ${minutes} min`;
    if(minutes) return `${minutes} min ${rest} s`;

    return `${rest} s`;
}

function progressSourceId(item){
    if(item.source_id) return item.source_id;
    if(!item.task_id) return "";

    const splitIndex = item.task_id.lastIndexOf(":");

    return splitIndex > 0 ? item.task_id.slice(0, splitIndex) : "";
}

function progressFile(item){
    if(item.file) return item.file;
    if(!item.task_id) return "";

    const splitIndex = item.task_id.lastIndexOf(":");

    return splitIndex > 0 ? item.task_id.slice(splitIndex + 1) : "";
}

function progressTaskKey(item){
    const sourceId = progressSourceId(item);
    const file = progressFile(item);

    if(!sourceId || !file) return "";

    return `${sourceId}:${file}`;
}

async function loadAdminTaskCatalog(){
    const groups = await Promise.all(
        ADMIN_TASK_SOURCES.map(async source => {
            try {
                const response = await fetch(source.path);

                if(!response.ok) return [];

                const items = await response.json();

                return items.map(task => ({
                    ...task,
                    category: source.category,
                    level: task.level || source.level,
                    coursePart: task.coursePart || task.section || "zadania",
                    sourceId: source.path,
                    sourceLabel: source.label,
                    sourceDetail: source.detail
                }));
            } catch(error) {
                return [];
            }
        })
    );

    adminTaskCatalog = groups.flat();
}

function getCatalogSources(category, level, options = {}){
    const sourceMap = new Map();

    adminTaskCatalog
        .filter(task =>
            task.category === category &&
            task.level === level &&
            (!options.coursePart || task.coursePart === options.coursePart)
        )
        .forEach(task => {
            if(!sourceMap.has(task.sourceId)){
                sourceMap.set(task.sourceId, {
                    id: task.sourceId,
                    files: new Set()
                });
            }

            sourceMap.get(task.sourceId).files.add(task.file);
        });

    return [...sourceMap.values()]
        .map(source => ({
            ...source,
            totalTasks: source.files.size
        }))
        .filter(source => source.totalTasks > 0);
}

function calculateStudentProgressStats(progress, level, category, target, options = {}){
    const attemptedTasks = new Set(
        progress
            .map(progressTaskKey)
            .filter(Boolean)
    );
    const sources = getCatalogSources(category, level, options);

    let completed = 0;
    let started = 0;
    let attempted = 0;
    let total = 0;
    let visualUnits = 0;

    sources.forEach(source => {
        const attemptedInSource = [...source.files]
            .filter(file => attemptedTasks.has(`${source.id}:${file}`))
            .length;

        total += source.totalTasks;
        attempted += attemptedInSource;

        if(attemptedInSource > 0) started++;

        if(attemptedInSource >= source.totalTasks){
            completed++;
            visualUnits++;
        } else if(source.totalTasks){
            visualUnits += attemptedInSource / source.totalTasks;
        }
    });

    return {
        target,
        completed,
        started,
        attempted,
        total,
        available: sources.length,
        percent: Math.min(100, Math.round((visualUnits / target) * 1000) / 10)
    };
}

function sumDuration(progress){
    return progress.reduce((total, item) => total + (Number(item.duration_seconds) || 0), 0);
}

function paceState(attempts, totalDuration){
    if(!attempts) return { className: "ok", label: "brak prób" };
    if(!totalDuration) return { className: "missing", label: "czas od kolejnych prób" };

    const average = totalDuration / attempts;

    if(attempts >= 5 && average < 10){
        return { className: "watch", label: "podejrzanie szybko" };
    }

    return { className: "ok", label: "tempo OK" };
}

function button(label, className, onClick){
    const element = document.createElement("button");

    element.type = "button";
    element.className = className;
    element.innerText = label;
    element.addEventListener("click", onClick);

    return element;
}

function setStudentLevel(level){
    studentLevelInput.value = level;

    levelCards.forEach(card => {
        card.classList.toggle("active", card.dataset.level === level);
    });
}

function confirmStudentAction(action, student, details = ""){
    const suffix = details ? `\n\n${details}` : "";

    return window.confirm(`Czy na pewno chcesz ${action} ucznia ${student.display_name}?${suffix}`);
}

async function copyStudentCredentials(student){
    const password = getIssuedPassword(student);
    const text = password
        ? `Login: ${student.email}\nHasło: ${password}`
        : `Login: ${student.email}\nHasło: zresetuj hasło, aby wydać nowe`;

    try {
        await navigator.clipboard.writeText(text);
        showStatus("Skopiowano dane logowania ucznia.");
    } catch(error) {
        showStatus(text);
    }
}

function buildCredentialsCell(student){
    const cell = document.createElement("td");
    const wrap = document.createElement("div");
    const loginLine = document.createElement("div");
    const loginLabel = document.createElement("span");
    const loginValue = document.createElement("strong");
    const passwordLine = document.createElement("div");
    const passwordLabel = document.createElement("span");
    const passwordValue = document.createElement("strong");
    const copyButton = document.createElement("button");
    const issuedPassword = getIssuedPassword(student);

    wrap.className = "login-details";
    loginLine.className = "login-line";
    passwordLine.className = "login-line";
    copyButton.type = "button";
    copyButton.className = "mini-link";
    copyButton.innerText = "Kopiuj dane";
    copyButton.addEventListener("click", () => copyStudentCredentials(student));

    loginLabel.innerText = "Login";
    loginValue.innerText = student.email;
    passwordLabel.innerText = "Hasło";
    passwordValue.innerText = issuedPassword || "Resetuj, aby wydać nowe";

    if(!issuedPassword){
        passwordValue.className = "missing";
    }

    loginLine.appendChild(loginLabel);
    loginLine.appendChild(loginValue);
    passwordLine.appendChild(passwordLabel);
    passwordLine.appendChild(passwordValue);
    wrap.appendChild(loginLine);
    wrap.appendChild(passwordLine);
    wrap.appendChild(copyButton);
    cell.appendChild(wrap);

    return cell;
}

function miniProgress(label, value, total, percent, className = ""){
    const row = document.createElement("div");
    const head = document.createElement("div");
    const name = document.createElement("span");
    const count = document.createElement("span");
    const track = document.createElement("div");
    const fill = document.createElement("span");

    row.className = "progress-mini-row";
    head.className = "progress-mini-head";
    track.className = "progress-mini-track";
    fill.className = className ? `progress-mini-fill ${className}` : "progress-mini-fill";

    name.innerText = label;
    count.innerText = `${value}/${total}`;
    fill.style.width = `${percent}%`;

    head.appendChild(name);
    head.appendChild(count);
    track.appendChild(fill);
    row.appendChild(head);
    row.appendChild(track);

    return row;
}

function buildProgressCell(student){
    const cell = document.createElement("td");
    const wrap = document.createElement("div");
    const progress = studentProgressCache.get(student.id) || [];
    const totalDuration = progress.length ? sumDuration(progress) : Number(student.total_duration_seconds) || 0;
    const attempts = progress.length || Number(student.attempts) || 0;
    const averageDuration = attempts ? Math.round(totalDuration / attempts) : 0;
    const pace = paceState(attempts, totalDuration);
    const courseStats = calculateStudentProgressStats(
        progress,
        student.level,
        "kurs",
        COURSE_TARGETS[student.level] || 20,
        { coursePart: "praca_domowa" }
    );
    const examStats = calculateStudentProgressStats(
        progress,
        student.level,
        "egzaminy",
        EXAM_TARGETS[student.level] || 20
    );
    const text = document.createElement("div");
    const time = document.createElement("div");
    const badge = document.createElement("span");
    const reviewCount = Number(student.review_count) || 0;

    wrap.className = "progress-cell";
    text.className = "progress-text";
    time.className = "work-time";
    badge.className = `pace-badge ${pace.className}`;

    text.innerText = `${student.attempts || 0} prób • ${student.accuracy || 0}% dobrze`;
    time.innerText = `Czas: ${formatDuration(totalDuration)} • śr. ${formatDuration(averageDuration)}`;
    badge.innerText = pace.label;

    wrap.appendChild(miniProgress("Kurs", courseStats.completed, courseStats.target, courseStats.percent));
    wrap.appendChild(miniProgress("Egzaminy", examStats.completed, examStats.target, examStats.percent, "exam"));
    wrap.appendChild(text);
    wrap.appendChild(time);
    wrap.appendChild(badge);

    if(reviewCount){
        const reviewBadge = document.createElement("span");

        reviewBadge.className = "review-count";
        reviewBadge.innerText = `Do omówienia: ${reviewCount}`;
        wrap.appendChild(reviewBadge);
    }

    cell.appendChild(wrap);

    return cell;
}

function renderStudents(){
    studentTable.innerHTML = "";

    if(!students.length){
        const row = document.createElement("tr");
        const cell = document.createElement("td");

        cell.colSpan = 9;
        cell.innerText = "Brak uczniów.";
        row.appendChild(cell);
        studentTable.appendChild(row);
        return;
    }

    students.forEach((student, index) => {
        const row = document.createElement("tr");
        const indexCell = document.createElement("td");
        const userCell = document.createElement("td");
        const credentialsCell = buildCredentialsCell(student);
        const levelCell = document.createElement("td");
        const statusCell = document.createElement("td");
        const progressCell = buildProgressCell(student);
        const createdCell = document.createElement("td");
        const activityCell = document.createElement("td");
        const actionsCell = document.createElement("td");
        const statusBadge = document.createElement("span");
        const actions = document.createElement("div");
        const primaryActions = document.createElement("div");
        const dangerActions = document.createElement("div");

        indexCell.className = "index-cell";
        indexCell.innerText = String(index + 1);
        userCell.innerText = student.display_name;
        levelCell.innerText = levelLabels[student.level] || student.level || "-";
        createdCell.innerText = formatDateOnly(student.created_at);
        activityCell.innerText = formatDate(student.last_activity_at || student.last_login_at);

        statusBadge.className = student.is_active ? "badge active" : "badge inactive";
        statusBadge.innerText = student.is_active ? "Aktywny" : "Zablokowany";
        statusCell.appendChild(statusBadge);

        actions.className = "actions";
        primaryActions.className = "action-primary";
        dangerActions.className = "action-danger-group";

        primaryActions.appendChild(button("Postępy", "btn secondary", () => showProgress(student)));
        dangerActions.appendChild(button(
            student.is_active ? "Zablokuj" : "Aktywuj",
            student.is_active ? "btn danger" : "btn secondary",
            () => toggleStudent(student)
        ));
        dangerActions.appendChild(button("Reset hasła", "btn secondary", () => resetPassword(student)));
        dangerActions.appendChild(button("Usuń", "btn danger", () => deleteStudent(student)));
        actions.appendChild(primaryActions);
        actions.appendChild(dangerActions);
        actionsCell.appendChild(actions);

        row.appendChild(indexCell);
        row.appendChild(userCell);
        row.appendChild(credentialsCell);
        row.appendChild(createdCell);
        row.appendChild(levelCell);
        row.appendChild(statusCell);
        row.appendChild(progressCell);
        row.appendChild(activityCell);
        row.appendChild(actionsCell);
        studentTable.appendChild(row);
    });

}

async function loadStudents(){
    const data = await apiFetch("/api/admin/students");

    students = data.students;
    renderStudents();
    await loadStudentProgressSummaries();
    renderStudents();
}

async function loadStudentProgressSummaries(){
    const pairs = await Promise.all(
        students.map(async student => {
            try {
                const data = await apiFetch(`/api/admin/students/${student.id}/progress`);

                return [student.id, Array.isArray(data.progress) ? data.progress : []];
            } catch(error) {
                return [student.id, []];
            }
        })
    );

    studentProgressCache = new Map(pairs);
}

async function toggleStudent(student){
    const action = student.is_active ? "zablokować" : "aktywować";

    if(!confirmStudentAction(action, student)){
        return;
    }

    await apiFetch(`/api/admin/students/${student.id}`, {
        method: "PATCH",
        body: JSON.stringify({
            is_active: !student.is_active
        })
    });

    await loadStudents();
}

async function resetPassword(student){
    if(!confirmStudentAction("zresetować hasło", student, "Poprzednie hasło przestanie działać.")){
        return;
    }

    const data = await apiFetch(`/api/admin/students/${student.id}/password`, {
        method: "POST",
        body: JSON.stringify({})
    });

    rememberIssuedPassword(data.student, data.temporary_password);
    showCredentials("Nowe hasło ucznia", data.student, data.temporary_password);
    showStatus(`Nowe hasło dla ${student.display_name}: ${data.temporary_password}`);
    await loadStudents();
}

async function deleteStudent(student){
    if(!confirmStudentAction("usunąć", student, "Ta operacja usunie też zapisane postępy i nie da się jej cofnąć.")){
        return;
    }

    await apiFetch(`/api/admin/students/${student.id}`, {
        method: "DELETE"
    });

    forgetIssuedPassword(student.id);
    showStatus(`Usunięto ucznia: ${student.display_name}`);
    await loadStudents();
}

function groupProgressByDay(progress){
    const days = new Map();

    progress.forEach(item => {
        const key = dayKey(item.created_at);

        if(!days.has(key)){
            days.set(key, {
                key,
                date: item.created_at,
                good: 0,
                medium: 0,
                bad: 0,
                total: 0
            });
        }

        const day = days.get(key);
        const result = ["good", "medium", "bad"].includes(item.result) ? item.result : "bad";

        day[result]++;
        day.total++;
    });

    return [...days.values()].sort((a, b) => a.key.localeCompare(b.key));
}

function renderActivityChart(progress){
    const days = groupProgressByDay(progress).slice(-21);
    const maxTotal = Math.max(1, ...days.map(day => day.total));

    activityChart.innerHTML = "";

    if(!days.length){
        const empty = document.createElement("div");

        empty.className = "day-label";
        empty.innerText = "Brak zapisanych prób.";
        activityChart.appendChild(empty);
        return;
    }

    days.forEach(day => {
        const column = document.createElement("div");
        const total = document.createElement("div");
        const bar = document.createElement("div");
        const label = document.createElement("div");

        column.className = "day-column";
        total.className = "day-total";
        bar.className = "stacked-bar";
        label.className = "day-label";

        total.innerText = day.total;
        bar.style.height = `${Math.max(24, Math.round((day.total / maxTotal) * 150))}px`;
        label.innerText = formatShortDate(day.date);
        bar.title = `${formatDate(day.date)}: ${day.total} prób`;

        ["good", "medium", "bad"].forEach(result => {
            if(!day[result]) return;

            const segment = document.createElement("div");

            segment.className = `bar-segment ${result}`;
            segment.style.height = `${(day[result] / day.total) * 100}%`;
            segment.title = `${resultLabel(result)}: ${day[result]}`;
            bar.appendChild(segment);
        });

        column.appendChild(total);
        column.appendChild(bar);
        column.appendChild(label);
        activityChart.appendChild(column);
    });
}

function renderWorkSummary(progress){
    const attempts = progress.length;
    const totalDuration = sumDuration(progress);
    const averageDuration = attempts ? Math.round(totalDuration / attempts) : 0;
    const pace = paceState(attempts, totalDuration);
    const items = [
        ["Łączny czas", formatDuration(totalDuration)],
        ["Średnio na próbę", formatDuration(averageDuration)],
        ["Kontrola tempa", pace.label]
    ];

    workSummary.innerHTML = "";

    items.forEach(([label, value]) => {
        const box = document.createElement("div");
        const title = document.createElement("span");
        const content = document.createElement("strong");

        box.className = "work-summary-item";
        title.innerText = label;
        content.innerText = value;

        box.appendChild(title);
        box.appendChild(content);
        workSummary.appendChild(box);
    });
}

function reviewTaskTitle(item){
    return item.title || item.file || item.task_id || "Zadanie";
}

function reviewTaskMeta(item){
    const parts = [];

    if(item.topic) parts.push(item.topic);
    if(item.course_part === "praca_domowa") parts.push("praca domowa");
    if(item.level) parts.push(levelLabels[item.level] || item.level);

    return parts.join(" • ");
}

function renderReviewTasks(items, student){
    reviewTasks.innerHTML = "";

    const heading = document.createElement("h4");
    heading.innerText = "Zadania do omówienia";
    reviewTasks.appendChild(heading);

    if(!items.length){
        const empty = document.createElement("div");

        empty.className = "review-empty";
        empty.innerText = "Brak zadań oczekujących na omówienie.";
        reviewTasks.appendChild(empty);
        return;
    }

    items.forEach(item => {
        const row = document.createElement("div");
        const main = document.createElement("div");
        const title = document.createElement("strong");
        const meta = document.createElement("div");
        const date = document.createElement("div");
        const action = button("Odznacz", "btn secondary", () => resolveReviewTask(item, student));

        row.className = "review-item";
        main.className = "review-main";
        meta.className = "review-meta";
        date.className = "review-meta";

        title.innerText = reviewTaskTitle(item);
        meta.innerText = reviewTaskMeta(item) || item.file || "";
        date.innerText = `Dodano: ${formatDate(item.created_at)}`;

        main.appendChild(title);
        main.appendChild(meta);
        main.appendChild(date);
        row.appendChild(main);
        row.appendChild(action);
        reviewTasks.appendChild(row);
    });
}

async function loadReviewTasks(student){
    const data = await apiFetch(`/api/admin/students/${student.id}/review-tasks`);

    return Array.isArray(data.review_tasks) ? data.review_tasks : [];
}

async function resolveReviewTask(item, student){
    await apiFetch(`/api/admin/review-tasks/${item.id}`, {
        method: "PATCH",
        body: JSON.stringify({
            is_resolved: true
        })
    });

    const items = await loadReviewTasks(student);

    renderReviewTasks(items, student);
    showStatus(`Odznaczono: ${reviewTaskTitle(item)}.`);
    await loadStudents();
}

function renderRecentProgress(progress){
    recentProgress.innerHTML = "";

    progress.slice(0, 12).forEach(item => {
        const row = document.createElement("div");
        const date = document.createElement("span");
        const task = document.createElement("span");
        const result = document.createElement("span");

        row.className = "recent-row";
        date.innerText = formatDate(item.created_at);
        task.innerText = item.file || item.task_id;
        result.className = `result-pill ${item.result}`;
        result.innerText = `${resultLabel(item.result)} • ${formatDuration(item.duration_seconds || 0)}`;

        row.appendChild(date);
        row.appendChild(task);
        row.appendChild(result);
        recentProgress.appendChild(row);
    });
}

async function showProgress(student){
    if(activeProgressStudentId === student.id && progressDetail.classList.contains("active")){
        progressDetail.classList.remove("active");
        activeProgressStudentId = null;
        showStatus(`Schowano postępy ucznia ${student.display_name}.`);
        return;
    }

    const [data, reviewItems] = await Promise.all([
        apiFetch(`/api/admin/students/${student.id}/progress`),
        loadReviewTasks(student)
    ]);
    const progress = data.progress;

    progressTitle.innerText = `Postępy: ${student.display_name}`;
    progressDetail.classList.add("active");
    activeProgressStudentId = student.id;
    studentProgressCache.set(student.id, progress);
    renderStudents();
    renderWorkSummary(progress);
    renderReviewTasks(reviewItems, student);
    renderActivityChart(progress);
    renderRecentProgress(progress);

    if(!progress.length && !reviewItems.length){
        showStatus(`${student.display_name}: brak zapisanych prób i zadań do omówienia.`);
        return;
    }

    showStatus(`Wczytano dane ucznia ${student.display_name}: ${progress.length} prób, ${reviewItems.length} do omówienia.`);
}

document.getElementById("closeProgressBtn").addEventListener("click", () => {
    progressDetail.classList.remove("active");
    activeProgressStudentId = null;
});

levelCards.forEach(card => {
    card.addEventListener("click", () => {
        setStudentLevel(card.dataset.level);
    });
});

setStudentLevel(studentLevelInput.value);

studentForm.addEventListener("submit", async event => {
    event.preventDefault();

    const formData = new FormData(studentForm);
    const payload = {
        display_name: formData.get("display_name"),
        email: formData.get("email"),
        level: formData.get("level"),
        password: formData.get("password")
    };

    try {
        const data = await apiFetch("/api/admin/students", {
            method: "POST",
            body: JSON.stringify(payload)
        });

        studentForm.reset();
        setStudentLevel("matura_podstawowa");
        rememberIssuedPassword(data.student, data.temporary_password);
        showCredentials("Utworzono konto ucznia", data.student, data.temporary_password);
        showStatus("Konto ucznia zostało utworzone. Dane logowania są widoczne powyżej.");
        await loadStudents();
    } catch(error) {
        showStatus(error.message || "Nie udało się utworzyć ucznia.");
    }
});

copyCredentialsBtn.addEventListener("click", copyLastCredentials);

document.getElementById("logoutBtn").addEventListener("click", async () => {
    try {
        await apiFetch("/api/auth/logout", { method: "POST" });
    } finally {
        if(window.clearAuthToken){
            window.clearAuthToken();
        } else {
            window.localStorage.removeItem("deltaSigmaAuthToken");
        }
    }

    window.location.href = "login.html";
});

async function boot(){
    try {
        const session = await apiFetch("/api/auth/me");

        if(!session.authenticated || session.user.role !== "admin"){
            window.location.href = "login.html";
            return;
        }

        adminEmail.innerText = session.user.email;
        await loadAdminTaskCatalog();
        await loadStudents();
    } catch(error) {
        window.location.href = "login.html";
    }
}

boot();
</script>
