<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulatory</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
:root {
    --page-bg: #f0f2f5;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --line: #d9e1ea;
    --line-dark: #111827;
    --text: #1f2a36;
    --muted: #64748b;
    --navy: #263545;
    --navy-hover: #1c2834;
    --blue-soft: #e8f1fb;
    --blue-text: #24527a;
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--page-bg);
    color: var(--text);
}

.container {
    max-width: 1180px;
    margin: 40px auto;
    padding: 20px;
}

.page-header {
    margin-bottom: 16px;
}

.page-title {
    margin: 0;
    font-size: 28px;
    line-height: 1.2;
}

.calculator-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
}

.calculator-card {
    display: grid;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--shadow);
}

.calculator-card h2 {
    margin: 0;
    font-size: 18px;
    line-height: 1.25;
}

.input-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
}

.input-grid.single {
    grid-template-columns: 1fr;
}

.field {
    display: grid;
    gap: 5px;
}

.field.full {
    grid-column: 1 / -1;
}

label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
}

input {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 11px;
    background: white;
    color: var(--text);
    font: inherit;
}

input:focus {
    outline: 3px solid rgba(88, 101, 242, 0.18);
    outline-offset: 1px;
    border-color: #b8d3ee;
}

.calc-btn {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--navy);
    border-radius: 8px;
    background: var(--navy);
    color: white;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    transition:
        background 0.2s ease,
        border-color 0.2s ease,
        transform 0.2s ease;
}

.calc-btn:hover {
    background: var(--navy-hover);
    border-color: var(--navy-hover);
    transform: translateY(-1px);
}

.calc-btn:focus-visible {
    outline: 3px solid rgba(88, 101, 242, 0.25);
    outline-offset: 2px;
}

.result {
    min-height: 48px;
    border: 1px solid var(--line);
    border-left: 4px solid #8eb5de;
    border-radius: 8px;
    padding: 12px;
    background: var(--surface-soft);
    color: var(--text);
    overflow-x: auto;
}

footer {
    text-align: center;
    padding: 15px;
    background: #1f2a36;
    color: #aaa;
    margin-top: 40px;
}

@media(max-width: 760px) {
    .container {
        margin: 24px auto;
        padding: 5px;
    }

    .page-header {
        margin-bottom: 12px;
    }

    .page-title {
        font-size: 24px;
    }

    .calculator-grid {
        grid-template-columns: 1fr;
        gap: 12px;
    }

    .calculator-card {
        padding: 16px;
    }

    .input-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div id="nav"></div>

<main class="container">
    <div class="page-header">
        <h1 class="page-title">Kalkulatory</h1>
    </div>

    <div class="calculator-grid">

        <section class="calculator-card">
            <h2>Bernoulli</h2>

            <div class="input-grid">
                <div class="field">
                    <label for="p">p</label>
                    <input id="p" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="n">n</label>
                    <input id="n" inputmode="numeric">
                </div>

                <div class="field full">
                    <label for="k">k</label>
                    <input id="k" placeholder="1,2,3">
                </div>
            </div>

            <button class="calc-btn" onclick="calcBernoulli()">Oblicz</button>
            <div id="res1" class="result"></div>
        </section>

        <section class="calculator-card">
            <h2>Wielomian</h2>

            <div class="input-grid single">
                <div class="field">
                    <label for="coeffs">Współczynniki</label>
                    <input id="coeffs" placeholder="1,0,-1">
                </div>
            </div>

            <button class="calc-btn" onclick="calcPoly()">Oblicz</button>
            <div id="res2" class="result"></div>
        </section>

        <section class="calculator-card">
            <h2>Styczna</h2>

            <div class="input-grid">
                <div class="field">
                    <label for="xa">xA</label>
                    <input id="xa" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="ya">yA</label>
                    <input id="ya" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="xs">xS</label>
                    <input id="xs" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="ys">yS</label>
                    <input id="ys" inputmode="decimal">
                </div>

                <div class="field full">
                    <label for="r">r</label>
                    <input id="r" inputmode="decimal">
                </div>
            </div>

            <button class="calc-btn" onclick="calcStyczna()">Oblicz</button>
            <div id="res_styczna" class="result"></div>
        </section>

        <section class="calculator-card">
            <h2>Prosta i okrąg</h2>

            <div class="input-grid">
                <div class="field">
                    <label for="A">A</label>
                    <input id="A" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="B">B</label>
                    <input id="B" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="C">C</label>
                    <input id="C" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="p1">p</label>
                    <input id="p1" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="q1">q</label>
                    <input id="q1" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="r1">r</label>
                    <input id="r1" inputmode="decimal">
                </div>
            </div>

            <button class="calc-btn" onclick="calcLineCircle()">Oblicz</button>
            <div id="res_line" class="result"></div>
        </section>

        <section class="calculator-card">
            <h2>Dwa okręgi</h2>

            <div class="input-grid">
                <div class="field">
                    <label for="a">a1</label>
                    <input id="a" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="b">b1</label>
                    <input id="b" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="c">r1</label>
                    <input id="c" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="p2">a2</label>
                    <input id="p2" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="q2">b2</label>
                    <input id="q2" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="r2">r2</label>
                    <input id="r2" inputmode="decimal">
                </div>
            </div>

            <button class="calc-btn" onclick="calcTwoCircles()">Oblicz</button>
            <div id="res_circles" class="result"></div>
        </section>

        <section class="calculator-card">
            <h2>Kąt</h2>

            <div class="input-grid">
                <div class="field">
                    <label for="a1">a1</label>
                    <input id="a1" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="a2">a2</label>
                    <input id="a2" inputmode="decimal">
                </div>
            </div>

            <button class="calc-btn" onclick="calcAngle()">Oblicz</button>
            <div id="res_angle" class="result"></div>
        </section>

    </div>
</main>

<footer>© 2026 Delta sigma</footer>

<script src="static/script.js"></script>
<script>
fetch("nav.html")
.then(res => res.text())
.then(data => {
    document.getElementById("nav").innerHTML = data;
});
</script>

</body>
</html>
