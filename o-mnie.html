<style>
.about-shared {
    max-width: min(1040px, calc(100% - 32px));
    margin: 22px auto;
    padding: 0;
}

.about-shared__layout {
    display: grid;
    grid-template-columns: minmax(220px, 300px) minmax(0, 1fr);
    gap: 16px;
    align-items: stretch;
}

.about-shared__slider {
    position: relative;
    min-height: 230px;
    overflow: hidden;
    border: 1px solid rgba(31, 42, 54, 0.08);
    border-radius: 12px;
    background: #e9edf3;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.07);
}

.about-shared__slider img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.2s ease;
}

.about-shared__slider img.active {
    opacity: 1;
}

.about-shared__content {
    display: grid;
    gap: 9px;
    align-content: center;
    border: 1px solid rgba(31, 42, 54, 0.08);
    border-top: 3px solid #8eb5de;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    padding: clamp(16px, 2vw, 24px);
}

.about-shared__content h2 {
    margin: 0;
    color: #1f2a36;
    font-size: clamp(22px, 2.4vw, 30px);
    line-height: 1.12;
}

.about-shared__lead,
.about-shared__content p {
    margin: 0;
    color: #334155;
    font-size: 14px;
    line-height: 1.5;
}

.about-shared__facts {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
    margin-top: 2px;
}

.about-shared__fact {
    border: 1px solid #d9e1ea;
    border-radius: 8px;
    background: #f8fafc;
    padding: 7px 9px;
}

.about-shared__fact strong {
    display: block;
    color: #263545;
    font-size: 13px;
    line-height: 1.2;
}

.about-shared__fact span {
    display: block;
    margin-top: 2px;
    color: #64748b;
    font-size: 10px;
    font-weight: 600;
    line-height: 1.25;
}

@media(max-width: 820px) {
    .about-shared {
        max-width: calc(100% - 24px);
        margin: 18px auto;
    }

    .about-shared__layout,
    .about-shared__facts {
        grid-template-columns: 1fr;
    }

    .about-shared__slider {
        min-height: 220px;
    }
}
</style>

<section class="about-shared" aria-labelledby="aboutSharedTitle">
    <div class="about-shared__layout">
        <div class="about-shared__slider" id="about-photo-slider" aria-label="Zdjęcia prowadzącego">
            <img src="img/me3.png" class="active" alt="Karol Musioł">
            <img src="img/me1.jpeg" alt="Karol Musioł podczas zajęć">
        </div>

        <div class="about-shared__content">
            <h2 id="aboutSharedTitle">O mnie</h2>
            <p class="about-shared__lead">
                Nazywam się Karol Musioł. Od 2019 roku prowadzę korepetycje z matematyki we Wrocławiu i online, przygotowując uczniów do egzaminu ósmoklasisty oraz matury.
            </p>
            <div class="about-shared__facts" aria-label="Najważniejsze informacje">
                <div class="about-shared__fact">
                    <strong>2019+</strong>
                    <span>doświadczenie w korepetycjach</span>
                </div>
                <div class="about-shared__fact">
                    <strong>mgr inż.</strong>
                    <span>Politechnika Wrocławska</span>
                </div>
                <div class="about-shared__fact">
                    <strong>Delta Sigma</strong>
                    <span>kurs, testownik i monitoring pracy</span>
                </div>
            </div>
        </div>
    </div>
</section>
