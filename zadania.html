<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadania</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<style>
:root {
    --page-bg: #f0f2f5;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --line: #d9e1ea;
    --line-dark: #111827;
    --text: #1f2a36;
    --muted: #64748b;
    --navy: #263545;
    --navy-hover: #1c2834;
    --blue-soft: #e8f1fb;
    --blue-text: #24527a;
    --green-soft: #e8f5e7;
    --green-text: #2f6b36;
    --success: rgba(0, 160, 44, 0.82);
    --warning: rgba(238, 194, 55, 0.9);
    --danger: rgba(220, 52, 42, 0.86);
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--page-bg);
    color: var(--text);
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

.level-selector {
    display: flex;
    gap: 4px;
    background: #e9eef4;
    padding: 4px;
    border-radius: 8px;
    margin-bottom: 14px;
    border: 1px solid var(--line);
}

.level-btn {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.level-btn:hover {
    background: rgba(255,255,255,0.55);
    color: var(--text);
}

.level-btn.active {
    background: white;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
}

.task-card {
    background: var(--surface);
    border-radius: 8px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
}

.progress-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    min-height: 22px;
}

.tile {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    background: #d8dee6;
}

.tile.good {
    background: var(--success);
}

.tile.medium {
    background: var(--warning);
}

.tile.bad {
    background: var(--danger);
}

.top-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.timer,
.task-counter {
    border: 1px solid var(--line-dark);
    border-radius: 8px;
    padding: 9px 12px;
    font-weight: 600;
    background: white;
}

.task-counter {
    margin-left: auto;
    color: var(--muted);
}

.meta-box {
    display: flex;
    align-items: center;
    border: 1px solid var(--line-dark);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
}

.meta-podstawowa {
    background: linear-gradient(90deg, #d5b8ea, #ffffff);
}

.meta-rozszerzona {
    background: linear-gradient(90deg, #d5b8ea, #ffffff);
}

.meta-osmoklasista {
    background: linear-gradient(90deg, #b2d699, #ffffff);
}

.meta-section {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
}

.meta-divider {
    width: 1px;
    background: rgba(0,0,0,0.2);
    align-self: stretch;
}

.meta-right {
    margin-left: auto;
    display: flex;
    align-items: center;
}

.task-image {
    width: 100%;
    height: auto;
    max-height: 450px;
    object-fit: contain;
    display: block;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.25s ease, transform 0.25s ease;
}

.task-image.fade-out {
    opacity: 0;
    transform: translateY(24px);
}

.interaction-panel {
    margin-top: 16px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
}

.task-actions {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 10px;
}

.action-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.action-group.tools {
    justify-content: flex-start;
}

.action-group.navigation {
    justify-content: center;
}

.action-group.check {
    justify-content: flex-end;
}

button {
    font-family: inherit;
}

.action-btn,
.choice-btn {
    min-height: 40px;
    border: 1px solid transparent;
    padding: 9px 13px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition:
        background 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.2s ease;
}

.action-btn:hover,
.choice-btn:hover {
    transform: translateY(-1px);
}

.action-btn:focus-visible,
.choice-btn:focus-visible,
.level-btn:focus-visible {
    outline: 3px solid rgba(88, 101, 242, 0.25);
    outline-offset: 2px;
}

.action-btn:disabled,
.choice-btn:disabled {
    cursor: not-allowed;
    transform: none;
    opacity: 0.72;
}

.action-btn.tool {
    background: white;
    color: var(--blue-text);
    border-color: #cfe0f2;
}

.action-btn.tool:hover {
    background: var(--blue-soft);
    border-color: #b8d3ee;
}

.action-btn.answer {
    background: white;
    color: var(--green-text);
    border-color: #cce5c9;
}

.action-btn.answer:hover {
    background: var(--green-soft);
    border-color: #b8d9b4;
}

.action-btn.nav {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
    min-width: 124px;
}

.action-btn.nav:hover {
    background: var(--navy-hover);
    border-color: var(--navy-hover);
}

.action-btn.success {
    background: var(--success);
    color: white;
    border-color: transparent;
}

.action-btn.danger {
    background: var(--danger);
    color: white;
    border-color: transparent;
}

.result-buttons {
    display: none;
}

.result-buttons.active {
    display: flex;
}

.mcq {
    display: none;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
}

.mcq.active {
    display: grid;
}

.choice-btn {
    min-height: 48px;
    background: white;
    color: var(--text);
    border-color: var(--line);
    font-size: 16px;
}

.choice-btn:hover {
    background: #f3f6fa;
    border-color: #b9c6d4;
}

.choice-btn.correct {
    background: #dff3e4;
    border-color: var(--success);
    color: #20592b;
}

.choice-btn.wrong {
    background: #fde5e2;
    border-color: var(--danger);
    color: #8b2119;
}

.box {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: white;
    border: 1px solid var(--line);
    border-left: 4px solid #8eb5de;
    border-radius: 8px;
    white-space: pre-line;
    color: var(--text);
}

footer {
    text-align: center;
    padding: 15px;
    background: #1f2a36;
    color: #aaa;
    margin-top: 40px;
}

@media(max-width: 760px) {
    .container {
        margin: 24px auto;
        padding: 14px;
    }

    .task-card {
        padding: 16px;
    }

    .level-selector {
        flex-direction: column;
    }

    .task-actions {
        grid-template-columns: 1fr;
    }

    .action-group.tools,
    .action-group.navigation,
    .action-group.check {
        justify-content: stretch;
    }

    .action-group {
        display: grid;
        grid-template-columns: 1fr;
    }

    .action-btn {
        width: 100%;
    }

    .mcq {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .meta-box {
        flex-direction: column;
        align-items: stretch;
    }

    .meta-right {
        margin-left: 0;
        flex-direction: column;
        align-items: stretch;
    }

    .meta-divider {
        width: 100%;
        height: 1px;
    }

    .task-counter {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<div id="nav"></div>

<div class="container">

    <div class="level-selector">
        <button class="level-btn active" onclick="setLevel(this,'matura_podstawowa')">Podstawowa</button>
        <button class="level-btn" onclick="setLevel(this,'matura_rozszerzona')">Rozszerzona</button>
        <button class="level-btn" onclick="setLevel(this,'egzamin_osmoklasisty')">Ósmoklasista</button>
    </div>

    <div class="task-card">

        <div class="progress-grid" id="progress"></div>

        <div class="top-row">
            <div class="timer" id="timer">Czas 00:00</div>
            <div class="task-counter" id="taskCounter">0 / 0</div>
        </div>

        <div class="meta-box meta-podstawowa" id="metaBox"></div>

        <img id="taskImage" class="task-image" src="" alt="zadanie">

        <div class="interaction-panel">
            <div class="task-actions">
                <div class="action-group tools">
                    <button class="action-btn tool" onclick="showHint()">Wskazówka</button>
                    <button class="action-btn answer" onclick="showAnswer()">Odpowiedź</button>
                </div>

                <div class="action-group navigation">
                    <button class="action-btn nav" onclick="prevTask()">← Poprzednie</button>
                    <button class="action-btn nav" onclick="nextTask()">Kolejne →</button>
                </div>

                <div class="action-group check result-buttons" id="resultButtons">
                    <button class="action-btn success" onclick="finish('good')">✓ Dobrze</button>
                    <button class="action-btn danger" onclick="finish('bad')">× Źle</button>
                </div>
            </div>

            <div class="mcq" id="mcq"></div>

            <div id="answer" class="box"></div>
        </div>

    </div>
</div>

<footer>© 2026 Delta sigma</footer>

<script>
let tasks = [];
let selectedLevel = "matura_podstawowa";
let currentTask = null;
let hintUsed = false;
let answerShown = false;
let seconds = 0;
let currentIndex = 0;

setInterval(() => {
    seconds++;

    document.getElementById("timer").innerText =
        `Czas ${String(Math.floor(seconds / 60)).padStart(2,'0')}:${String(seconds % 60).padStart(2,'0')}`;
}, 1000);

fetch("zadania/lista.json")
.then(r => {
    if(!r.ok) throw new Error("Nie udało się wczytać listy zadań.");
    return r.json();
})
.then(d => {
    tasks = d;
    drawTask();
})
.catch(() => {
    showMessage("Nie udało się wczytać zadań. Odśwież stronę albo spróbuj później.");
});

function pool(){
    return tasks.filter(t => t.level === selectedLevel);
}

function setLevel(btn, level){
    selectedLevel = level;
    currentIndex = 0;

    document.querySelectorAll(".level-btn")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    const meta = document.getElementById("metaBox");

    meta.classList.remove(
        "meta-podstawowa",
        "meta-rozszerzona",
        "meta-osmoklasista",
        "meta-all"
    );

    if(level === "matura_podstawowa")
        meta.classList.add("meta-podstawowa");

    if(level === "matura_rozszerzona")
        meta.classList.add("meta-rozszerzona");

    if(level === "egzamin_osmoklasisty")
        meta.classList.add("meta-osmoklasista");

    drawTask();
}

function parseFile(file){
    const p = file.replace(".png","").split("_");

    const monthMap = {
        m: "maj",
        c: "czerwiec",
        pr: "próbna",
        s: "sierpień"
    };

    return `Zadanie ${p[0]} • ${p[1]} • ${monthMap[p[4]] || p[4]} • CKE`;
}

function stars(n){
    return "★".repeat(n) + "☆".repeat(5 - n);
}

function isClosedTask(task){
    if(task.type === "closed" && Array.isArray(task.options)) return true;

    return ["A", "B", "C", "D"].includes(task.answer);
}

function getOptions(task){
    if(Array.isArray(task.options)) return task.options;

    return ["A", "B", "C", "D"];
}

function drawTask(index = currentIndex){
    const p = pool();

    if(!p.length){
        currentTask = null;
        document.getElementById("taskCounter").innerText = "0 / 0";
        document.getElementById("taskImage").src = "";
        document.getElementById("metaBox").innerHTML = "";
        document.getElementById("mcq").classList.remove("active");
        document.getElementById("resultButtons").classList.remove("active");
        showMessage("Brak zadań dla wybranego poziomu.");
        return;
    }

    if(index < 0) index = p.length - 1;
    if(index >= p.length) index = 0;

    currentIndex = index;
    currentTask = p[currentIndex];

    const img = document.getElementById("taskImage");

    img.classList.add("fade-out");

    setTimeout(() => {
        img.onerror = () => {
            showMessage("Nie udało się wczytać obrazka zadania.");
        };

        img.src = "zadania/" + currentTask.file;

        document.getElementById("taskCounter").innerText =
            `${currentIndex + 1} / ${p.length}`;

        document.getElementById("metaBox").innerHTML =
        `
        <div class="meta-section">
            ${parseFile(currentTask.file)}
        </div>

        <div class="meta-divider"></div>

        <div class="meta-right">
            <div class="meta-section">
                ${currentTask.topic}
            </div>

            <div class="meta-divider"></div>

            <div class="meta-section">
                ${stars(currentTask.difficulty)}
            </div>
        </div>
        `;

        img.classList.remove("fade-out");

        setupMCQ();
        hideMessage();

        hintUsed = false;
        answerShown = false;
    }, 200);
}

function nextTask(){
    const p = pool();

    if(!p.length) return;

    currentIndex++;

    if(currentIndex >= p.length){
        currentIndex = 0;
    }

    drawTask(currentIndex);
}

function prevTask(){
    const p = pool();

    if(!p.length) return;

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = p.length - 1;
    }

    drawTask(currentIndex);
}

function setupMCQ(){
    const mcq = document.getElementById("mcq");
    const resultButtons = document.getElementById("resultButtons");

    mcq.innerHTML = "";
    resultButtons.classList.remove("active");

    if(isClosedTask(currentTask)){
        mcq.classList.add("active");

        getOptions(currentTask).forEach(option => {
            const b = document.createElement("button");

            b.className = "choice-btn";
            b.innerText = option;
            b.onclick = () => choose(option, b);

            mcq.appendChild(b);
        });
    } else {
        mcq.classList.remove("active");
        resultButtons.classList.add("active");
    }
}

function choose(opt, btn){
    const correct = currentTask.answer;

    disableMCQ();

    if(opt === correct){
        btn.classList.add("correct");
        addProgress(hintUsed || answerShown ? "medium" : "good");

        setTimeout(() => {
            nextTask();
        }, 650);

        return;
    }

    btn.classList.add("wrong");
    revealCorrectAnswer(correct);
    addProgress("bad");

    setTimeout(() => {
        nextTask();
    }, 1200);
}

function disableMCQ(){
    document.querySelectorAll("#mcq button")
        .forEach(b => {
            b.disabled = true;
        });
}

function revealCorrectAnswer(correct){
    document.querySelectorAll("#mcq button")
        .forEach(b => {
            if(b.innerText === correct){
                b.classList.add("correct");
            }
        });
}

function addProgress(type){
    const tile = document.createElement("div");

    tile.classList.add("tile", type);

    if(type === "good") tile.title = "Dobrze";
    if(type === "medium") tile.title = "Z pomocą";
    if(type === "bad") tile.title = "Źle";

    document.getElementById("progress")
        .appendChild(tile);
}

function finish(type){
    if(type === "good" && (hintUsed || answerShown)){
        addProgress("medium");
    } else {
        addProgress(type);
    }

    nextTask();
}

function showHint(){
    if(!currentTask) return;

    hintUsed = true;

    showMessage(currentTask.hint || "Brak wskazówki.");
}

function showAnswer(){
    if(!currentTask) return;

    answerShown = true;

    showMessage(currentTask.answer || "Brak odpowiedzi.");
}

function showMessage(text){
    const box = document.getElementById("answer");

    box.style.display = "block";
    box.innerText = text;
}

function hideMessage(){
    const box = document.getElementById("answer");

    box.style.display = "none";
    box.innerText = "";
}
</script>

<script>
fetch("nav.html")
.then(res => res.text())
.then(data => {
    document.getElementById("nav").innerHTML = data;
});
</script>

</body>
</html>
