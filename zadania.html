<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zadania</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<style>
:root {
    --page-bg: #f0f2f5;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --line: #d9e1ea;
    --line-dark: #111827;
    --text: #1f2a36;
    --muted: #64748b;
    --navy: #263545;
    --navy-hover: #1c2834;
    --blue-soft: #e8f1fb;
    --blue-text: #24527a;
    --green-soft: #e8f5e7;
    --green-text: #2f6b36;
    --red-soft: #fdecea;
    --red-text: #8b2119;
    --success: rgba(0, 160, 44, 0.82);
    --warning: rgba(238, 194, 55, 0.9);
    --danger: rgba(220, 52, 42, 0.86);
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--page-bg);
    color: var(--text);
}

.container {
    max-width: 1180px;
    margin: 40px auto;
    padding: 20px;
}

.tasks-layout {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 16px;
    align-items: start;
}

.task-sidebar {
    position: sticky;
    top: 16px;
    display: grid;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: var(--shadow);
}

.side-section {
    display: grid;
    gap: 8px;
}

.sidebar-controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    align-items: start;
}

.side-title {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
}

.level-selector {
    display: flex;
    gap: 4px;
    background: #e9eef4;
    padding: 4px;
    border-radius: 8px;
    margin-bottom: 14px;
    border: 1px solid var(--line);
}

.sidebar-levels {
    margin-bottom: 0;
    flex-direction: column;
}

.level-btn {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    line-height: 1.2;
    overflow-wrap: anywhere;
    transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.level-btn:hover {
    background: rgba(255,255,255,0.55);
    color: var(--text);
}

.level-btn.active {
    background: white;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
}

.source-list,
.mode-toggle {
    display: grid;
    gap: 6px;
}

.source-btn,
.mode-btn {
    width: 100%;
    border: 1px solid var(--line);
    background: white;
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition:
        background 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        box-shadow 0.2s ease;
}

.source-btn {
    display: grid;
    gap: 3px;
    padding: 10px 11px;
    text-align: left;
}

.source-btn small {
    color: var(--muted);
    font-size: 11px;
    font-weight: 400;
}

.mode-btn {
    min-height: 40px;
    padding: 9px 11px;
}

.source-btn:hover,
.mode-btn:hover {
    background: #f3f6fa;
    border-color: #b9c6d4;
}

.source-btn.active,
.mode-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.16);
}

.source-btn.active small {
    color: rgba(255,255,255,0.76);
}

.task-card {
    background: var(--surface);
    border-radius: 8px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
}

.progress-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    min-height: 22px;
}

.tile {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    background: #d8dee6;
}

.tile.good {
    background: var(--success);
}

.tile.medium {
    background: var(--warning);
}

.tile.bad {
    background: var(--danger);
}

.top-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.timer,
.task-counter {
    border: 1px solid var(--line-dark);
    border-radius: 8px;
    padding: 9px 12px;
    font-weight: 600;
    background: white;
}

.task-counter {
    margin-left: auto;
    color: var(--muted);
}

.meta-box {
    display: flex;
    align-items: center;
    border: 1px solid var(--line-dark);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
}

.meta-podstawowa {
    background: linear-gradient(90deg, #d5b8ea, #ffffff);
}

.meta-rozszerzona {
    background: linear-gradient(90deg, #d5b8ea, #ffffff);
}

.meta-osmoklasista {
    background: linear-gradient(90deg, #b2d699, #ffffff);
}

.meta-section {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
}

.meta-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
}

.task-image-stack {
    display: grid;
    gap: 12px;
}

.task-image {
    width: 100%;
    height: auto;
    max-height: 450px;
    object-fit: contain;
    display: block;
    padding: 10px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.25s ease, transform 0.25s ease;
}

.task-image.hidden {
    display: none;
}

.context-image {
    max-height: 360px;
}

.task-image.fade-out {
    opacity: 0;
    transform: translateY(24px);
}

.interaction-panel {
    margin-top: 16px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
}

.task-actions {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 10px;
}

.action-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.action-group.tools {
    justify-content: flex-start;
}

.action-group.navigation {
    justify-content: center;
}

.action-group.check {
    justify-content: flex-end;
}

button {
    font-family: inherit;
}

.action-btn,
.choice-btn {
    min-height: 40px;
    border: 1px solid transparent;
    padding: 9px 13px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition:
        background 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.2s ease;
}

.action-btn:hover,
.choice-btn:hover {
    transform: translateY(-1px);
}

.action-btn:focus-visible,
.choice-btn:focus-visible,
.level-btn:focus-visible,
.source-btn:focus-visible,
.mode-btn:focus-visible {
    outline: 3px solid rgba(88, 101, 242, 0.25);
    outline-offset: 2px;
}

.action-btn:disabled,
.choice-btn:disabled {
    cursor: not-allowed;
    transform: none;
    opacity: 0.72;
}

.action-btn.tool {
    background: white;
    color: var(--blue-text);
    border-color: #cfe0f2;
}

.action-btn.tool:hover {
    background: var(--blue-soft);
    border-color: #b8d3ee;
}

.action-btn.answer {
    background: white;
    color: var(--green-text);
    border-color: #cce5c9;
}

.action-btn.answer:hover {
    background: var(--green-soft);
    border-color: #b8d9b4;
}

.action-btn.nav {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
    min-width: 124px;
}

.action-btn.nav:hover {
    background: var(--navy-hover);
    border-color: var(--navy-hover);
}

.action-btn.success {
    background: var(--green-soft);
    color: var(--green-text);
    border-color: #cce5c9;
}

.action-btn.danger {
    background: var(--red-soft);
    color: var(--red-text);
    border-color: #efc6c2;
}

.action-btn.success:hover {
    background: #dff0dd;
    border-color: #b8d9b4;
}

.action-btn.danger:hover {
    background: #f9ddd9;
    border-color: #e8b5af;
}

.result-buttons {
    display: none;
}

.result-buttons.active {
    display: flex;
}

.mcq {
    display: none;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
}

.mcq.active {
    display: grid;
}

.choice-btn {
    min-height: 48px;
    background: white;
    color: var(--text);
    border-color: var(--line);
    font-size: 16px;
    line-height: 1.2;
    white-space: normal;
}

.choice-btn:hover {
    background: #f3f6fa;
    border-color: #b9c6d4;
}

.choice-btn.correct {
    background: #dff3e4;
    border-color: var(--success);
    color: #20592b;
}

.choice-btn.wrong {
    background: #fde5e2;
    border-color: var(--danger);
    color: #8b2119;
}

.box {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: white;
    border: 1px solid var(--line);
    border-left: 4px solid #8eb5de;
    border-radius: 8px;
    white-space: pre-line;
    color: var(--text);
}

footer {
    text-align: center;
    padding: 15px;
    background: #1f2a36;
    color: #aaa;
    margin-top: 40px;
}

@media(max-width: 760px) {
    .container {
        margin: 24px auto;
        padding: 5px;
    }

    .task-card {
        padding: 16px;
    }

    .tasks-layout {
        grid-template-columns: 1fr;
    }

    .task-sidebar {
        position: static;
        padding: 12px;
    }

    .level-selector {
        flex-direction: column;
    }

    .task-actions {
        grid-template-columns: 1fr;
        justify-items: center;
    }

    .action-group.tools,
    .action-group.navigation,
    .action-group.check {
        justify-content: center;
    }

    .action-group {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .action-group.result-buttons {
        display: none;
    }

    .action-group.result-buttons.active {
        display: flex;
    }

    .action-btn {
        min-width: min(160px, 100%);
    }

    .mcq {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .task-image-stack {
        gap: 10px;
    }

    .task-image {
        padding: 6px;
    }

    .context-image {
        max-height: 340px;
    }

    .meta-box {
        flex-direction: column;
        align-items: stretch;
        margin-bottom: 8px;
    }

    .meta-section {
        padding: 6px 10px;
        font-size: 12px;
        line-height: 1.2;
    }

    .meta-right {
        margin-left: 0;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        flex-wrap: wrap;
    }

    .meta-right .meta-section {
        padding-top: 4px;
    }

    .meta-right .meta-section:first-child {
        flex: 1 1 auto;
        min-width: 0;
    }

    .meta-right .meta-section:last-child {
        flex: 0 0 auto;
        white-space: nowrap;
    }

    .task-counter {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<div id="nav"></div>

<div class="container">

    <div class="tasks-layout">
        <aside class="task-sidebar" aria-label="Ustawienia zadań">
            <div class="sidebar-controls">
                <div class="side-section">
                    <div class="side-title">Poziom</div>
                    <div class="level-selector sidebar-levels">
                        <button class="level-btn active" data-level="matura_podstawowa" onclick="setLevel(this,'matura_podstawowa')">Matura podstawowa</button>
                        <button class="level-btn" data-level="matura_rozszerzona" onclick="setLevel(this,'matura_rozszerzona')">Matura rozszerzona</button>
                        <button class="level-btn" data-level="egzamin_osmoklasisty" onclick="setLevel(this,'egzamin_osmoklasisty')">Egzamin Ósmoklasisty</button>
                    </div>
                </div>

                <div class="side-section">
                    <div class="side-title">Tryb</div>
                    <div class="mode-toggle">
                        <button class="mode-btn active" data-mode="ordered" onclick="setMode(this,'ordered')">Po kolei</button>
                        <button class="mode-btn" data-mode="random" onclick="setMode(this,'random')">Losowo</button>
                    </div>
                </div>
            </div>

            <div class="side-section">
                <div class="side-title">Zestaw</div>
                <div class="source-list" id="sourceList"></div>
            </div>
        </aside>

        <div class="task-card">

            <div class="progress-grid" id="progress"></div>

            <div class="top-row">
                <div class="timer" id="timer">Czas 00:00</div>
                <div class="task-counter" id="taskCounter">0 / 0</div>
            </div>

            <div class="meta-box meta-podstawowa" id="metaBox"></div>

            <div class="task-image-stack">
                <img id="contextImage" class="task-image context-image hidden" src="" alt="informacja do zadania">
                <img id="taskImage" class="task-image" src="" alt="zadanie">
            </div>

            <div class="interaction-panel">
                <div class="task-actions">
                    <div class="action-group tools">
                        <button class="action-btn tool" onclick="showHint()">Wskazówka</button>
                        <button class="action-btn answer" onclick="showAnswer()">Odpowiedź</button>
                    </div>

                    <div class="action-group navigation">
                        <button class="action-btn nav" onclick="prevTask()">← Poprzednie</button>
                        <button class="action-btn nav" onclick="nextTask()">Kolejne →</button>
                    </div>

                    <div class="action-group check result-buttons" id="resultButtons">
                        <button class="action-btn success" onclick="finish('good')">✓ Dobrze</button>
                        <button class="action-btn danger" onclick="finish('bad')">× Źle</button>
                    </div>
                </div>

                <div class="mcq" id="mcq"></div>

                <div id="answer" class="box"></div>
            </div>

        </div>
    </div>
</div>

<footer>© 2026 Delta sigma</footer>

<script>
let tasks = [];
let selectedLevel = "matura_podstawowa";
let currentTask = null;
let hintUsed = false;
let answerShown = false;
let seconds = 0;
let currentIndex = 0;
let selectedSource = "all";
let taskMode = "ordered";
let randomHistory = [];
let randomHistoryIndex = -1;

const TASK_SOURCES = [
    "zadania/mp/2025/maj/2025_cke_p_m.json",
    "zadania/mr/2025/maj/2025_cke_r_m.json",
    "zadania/eo/2025/maj/2025_cke_o_m.json"
];

const SOURCE_TYPE_LABELS = {
    mp: "Matura podstawowa",
    mr: "Matura rozszerzona",
    eo: "Egzamin Ósmoklasisty"
};

const MONTH_LABELS = {
    maj: "maj"
};

setInterval(() => {
    seconds++;
    updateTimer();
}, 1000);

function updateTimer(){
    document.getElementById("timer").innerText =
        `Czas ${String(Math.floor(seconds / 60)).padStart(2,'0')}:${String(seconds % 60).padStart(2,'0')}`;
}

Promise.all(TASK_SOURCES.map(loadTaskSource))
.then(groups => {
    tasks = groups.flat();
    renderSourceSelector();
    drawTask(getInitialIndex());
})
.catch(() => {
    showMessage("Nie udało się wczytać zadań. Odśwież stronę albo spróbuj później.");
});

function loadTaskSource(source){
    const sourceMeta = getSourceMeta(source);

    return fetch(source)
    .then(r => {
        if(!r.ok) throw new Error("Nie udało się wczytać listy zadań.");
        return r.json();
    })
    .then(items => {
        const basePath = source.slice(0, source.lastIndexOf("/") + 1);

        return items.map(task => ({
            ...task,
            path: basePath + task.file,
            contextPath: task.contextFile ? basePath + task.contextFile : null,
            tags: Array.isArray(task.tags) ? task.tags : [],
            sourceId: sourceMeta.id,
            sourceLabel: sourceMeta.label,
            sourceDetail: sourceMeta.detail
        }));
    });
}

function getSourceMeta(source){
    const parts = source.split("/");
    const type = parts[1];
    const year = parts[2];
    const month = parts[3];
    const label = SOURCE_TYPE_LABELS[type] || "Zestaw";
    const detail = `${year} / ${MONTH_LABELS[month] || month} / CKE`;

    return {
        id: source,
        label,
        detail
    };
}

function pool(){
    return tasks.filter(t =>
        t.level === selectedLevel &&
        (selectedSource === "all" || t.sourceId === selectedSource)
    );
}

function setLevel(btn, level){
    selectedLevel = level;

    const selectedSourceTask = tasks.find(t => t.sourceId === selectedSource);

    if(selectedSourceTask && selectedSourceTask.level !== selectedLevel){
        selectedSource = "all";
    }

    updateLevelButtons();
    updateMetaTheme();
    resetSession();
    renderSourceSelector();
    drawTask(getInitialIndex());
}

function setSource(sourceId){
    selectedSource = sourceId;

    if(sourceId !== "all"){
        const sourceTask = tasks.find(t => t.sourceId === sourceId);

        if(sourceTask){
            selectedLevel = sourceTask.level;
        }
    }

    updateLevelButtons();
    updateMetaTheme();
    resetSession();
    renderSourceSelector();
    drawTask(getInitialIndex());
}

function setMode(btn, mode){
    taskMode = mode;
    updateModeButtons();
    resetSession();
    drawTask(getInitialIndex());
}

function updateLevelButtons(){
    document.querySelectorAll(".level-btn")
        .forEach(b => {
            b.classList.toggle("active", b.dataset.level === selectedLevel);
        });
}

function updateModeButtons(){
    document.querySelectorAll(".mode-btn")
        .forEach(b => {
            b.classList.toggle("active", b.dataset.mode === taskMode);
        });
}

function updateMetaTheme(){
    const meta = document.getElementById("metaBox");

    meta.classList.remove(
        "meta-podstawowa",
        "meta-rozszerzona",
        "meta-osmoklasista",
        "meta-all"
    );

    if(selectedLevel === "matura_podstawowa")
        meta.classList.add("meta-podstawowa");

    if(selectedLevel === "matura_rozszerzona")
        meta.classList.add("meta-rozszerzona");

    if(selectedLevel === "egzamin_osmoklasisty")
        meta.classList.add("meta-osmoklasista");
}

function renderSourceSelector(){
    const list = document.getElementById("sourceList");

    if(!list) return;

    list.innerHTML = "";

    addSourceButton(
        list,
        "all",
        "Wszystkie zestawy",
        `${tasks.filter(t => t.level === selectedLevel).length} zadań`,
        selectedSource === "all"
    );

    TASK_SOURCES
        .map(getSourceMeta)
        .forEach(source => {
            const count = tasks.filter(t =>
                t.sourceId === source.id &&
                t.level === selectedLevel
            ).length;

            if(!count) return;

            addSourceButton(
                list,
                source.id,
                source.label,
                `${source.detail} • ${count} zadań`,
                selectedSource === source.id
            );
        });
}

function addSourceButton(list, sourceId, label, detail, active){
    const button = document.createElement("button");
    const name = document.createElement("span");
    const meta = document.createElement("small");

    button.type = "button";
    button.className = active ? "source-btn active" : "source-btn";
    button.onclick = () => setSource(sourceId);

    name.innerText = label;
    meta.innerText = detail;

    button.appendChild(name);
    button.appendChild(meta);
    list.appendChild(button);
}

function resetSession(){
    currentIndex = 0;
    randomHistory = [];
    randomHistoryIndex = -1;
    seconds = 0;
    updateTimer();
    document.getElementById("progress").innerHTML = "";
}

function getInitialIndex(){
    const p = pool();

    if(!p.length) return 0;
    if(taskMode === "random") return randomIndex(p.length, -1);

    return 0;
}

function randomIndex(length, current){
    if(length <= 1) return 0;

    let index = current;

    while(index === current){
        index = Math.floor(Math.random() * length);
    }

    return index;
}

function rememberRandomIndex(index){
    if(taskMode !== "random") return;
    if(randomHistory[randomHistoryIndex] === index) return;

    randomHistory = randomHistory.slice(0, randomHistoryIndex + 1);
    randomHistory.push(index);
    randomHistoryIndex = randomHistory.length - 1;
}

function parseFile(file){
    const p = file.replace(".png","").split("_");

    const monthMap = {
        m: "maj",
        c: "czerwiec",
        pr: "próbna",
        s: "sierpień"
    };

    return `Zadanie ${p[0]} • ${p[1]} • ${monthMap[p[4]] || p[4]} • CKE`;
}

function stars(n){
    return "★".repeat(n) + "☆".repeat(5 - n);
}

function isClosedTask(task){
    if(task.type === "closed" && Array.isArray(task.options)) return true;

    return ["A", "B", "C", "D", "P", "F", "PP", "PF", "FP", "FF"].includes(task.answer);
}

function getOptions(task){
    if(Array.isArray(task.options)) return task.options;

    if(["P", "F"].includes(task.answer)) return ["P", "F"];
    if(["PP", "PF", "FP", "FF"].includes(task.answer)) return ["PP", "PF", "FP", "FF"];

    return ["A", "B", "C", "D"];
}

function formatOption(option){
    const labels = {
        P: "Prawda",
        F: "Fałsz",
        PP: "Prawda / Prawda",
        PF: "Prawda / Fałsz",
        FP: "Fałsz / Prawda",
        FF: "Fałsz / Fałsz"
    };

    return labels[option] || option;
}

function formatAnswer(answer){
    const formatted = formatOption(answer);

    if(formatted === answer) return answer;

    return `${answer} - ${formatted}`;
}

function drawTask(index = currentIndex, trackHistory = true){
    const p = pool();

    if(!p.length){
        currentTask = null;
        document.getElementById("taskCounter").innerText = "0 / 0";
        document.getElementById("taskImage").src = "";
        document.getElementById("contextImage").src = "";
        document.getElementById("contextImage").classList.add("hidden");
        document.getElementById("metaBox").innerHTML = "";
        document.getElementById("mcq").classList.remove("active");
        document.getElementById("resultButtons").classList.remove("active");
        showMessage("Brak zadań dla wybranego poziomu.");
        return;
    }

    if(index < 0) index = p.length - 1;
    if(index >= p.length) index = 0;

    currentIndex = index;
    currentTask = p[currentIndex];

    if(trackHistory){
        rememberRandomIndex(currentIndex);
    }

    const img = document.getElementById("taskImage");
    const contextImg = document.getElementById("contextImage");

    img.classList.add("fade-out");
    contextImg.classList.add("fade-out");

    setTimeout(() => {
        img.onerror = () => {
            showMessage("Nie udało się wczytać obrazka zadania.");
        };

        contextImg.onerror = () => {
            contextImg.classList.add("hidden");
            showMessage("Nie udało się wczytać informacji do zadania.");
        };

        if(currentTask.contextPath){
            contextImg.src = currentTask.contextPath;
            contextImg.classList.remove("hidden");
        } else {
            contextImg.removeAttribute("src");
            contextImg.classList.add("hidden");
        }

        img.src = currentTask.path;

        document.getElementById("taskCounter").innerText =
            `${currentIndex + 1} / ${p.length}`;

        document.getElementById("metaBox").innerHTML =
        `
        <div class="meta-section">
            ${parseFile(currentTask.file)}
        </div>

        <div class="meta-right">
            <div class="meta-section">
                ${currentTask.topic}
            </div>

            <div class="meta-section">
                ${stars(currentTask.difficulty)}
            </div>
        </div>
        `;

        img.classList.remove("fade-out");
        contextImg.classList.remove("fade-out");

        setupMCQ();
        hideMessage();

        hintUsed = false;
        answerShown = false;
    }, 200);
}

function nextTask(){
    const p = pool();

    if(!p.length) return;

    if(taskMode === "random"){
        if(randomHistoryIndex < randomHistory.length - 1){
            randomHistoryIndex++;
            drawTask(randomHistory[randomHistoryIndex], false);
            return;
        }

        drawTask(randomIndex(p.length, currentIndex));
        return;
    }

    currentIndex++;

    if(currentIndex >= p.length){
        currentIndex = 0;
    }

    drawTask(currentIndex);
}

function prevTask(){
    const p = pool();

    if(!p.length) return;

    if(taskMode === "random"){
        if(randomHistoryIndex > 0){
            randomHistoryIndex--;
            drawTask(randomHistory[randomHistoryIndex], false);
        }

        return;
    }

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = p.length - 1;
    }

    drawTask(currentIndex);
}

function setupMCQ(){
    const mcq = document.getElementById("mcq");
    const resultButtons = document.getElementById("resultButtons");

    mcq.innerHTML = "";
    resultButtons.classList.remove("active");

    if(isClosedTask(currentTask)){
        mcq.classList.add("active");

        getOptions(currentTask).forEach(option => {
            const b = document.createElement("button");

            b.className = "choice-btn";
            b.dataset.value = option;
            b.innerText = formatOption(option);
            b.onclick = () => choose(option, b);

            mcq.appendChild(b);
        });
    } else {
        mcq.classList.remove("active");
    }
}

function choose(opt, btn){
    const correct = currentTask.answer;

    disableMCQ();

    if(opt === correct){
        btn.classList.add("correct");
        addProgress(hintUsed || answerShown ? "medium" : "good");

        setTimeout(() => {
            nextTask();
        }, 650);

        return;
    }

    btn.classList.add("wrong");
    revealCorrectAnswer(correct);
    addProgress("bad");

    setTimeout(() => {
        nextTask();
    }, 1200);
}

function disableMCQ(){
    document.querySelectorAll("#mcq button")
        .forEach(b => {
            b.disabled = true;
        });
}

function revealCorrectAnswer(correct){
    document.querySelectorAll("#mcq button")
        .forEach(b => {
            if(b.dataset.value === correct){
                b.classList.add("correct");
            }
        });
}

function addProgress(type){
    const tile = document.createElement("div");

    tile.classList.add("tile", type);

    if(type === "good") tile.title = "Dobrze";
    if(type === "medium") tile.title = "Z pomocą";
    if(type === "bad") tile.title = "Źle";

    document.getElementById("progress")
        .appendChild(tile);
}

function finish(type){
    if(type === "good" && hintUsed){
        addProgress("medium");
    } else {
        addProgress(type);
    }

    nextTask();
}

function showHint(){
    if(!currentTask) return;

    hintUsed = true;

    showMessage(currentTask.hint || "Brak wskazówki.");
}

function showAnswer(){
    if(!currentTask) return;

    answerShown = true;

    showMessage(formatAnswer(currentTask.answer) || "Brak odpowiedzi.");

    if(!isClosedTask(currentTask)){
        document.getElementById("resultButtons").classList.add("active");
    }
}

function showMessage(text){
    const box = document.getElementById("answer");

    box.style.display = "block";
    box.innerText = text;
}

function hideMessage(){
    const box = document.getElementById("answer");

    box.style.display = "none";
    box.innerText = "";
}
</script>

fetch("nav.html")
