<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/webp" href="img/logo.webp">
<link rel="shortcut icon" type="image/webp" href="img/logo.webp">
<link rel="apple-touch-icon" href="img/logo.webp">
<title>Zadania</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<style>
:root {
    --page-bg: #f0f2f5;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --line: #d9e1ea;
    --line-dark: #111827;
    --text: #1f2a36;
    --muted: #64748b;
    --navy: #263545;
    --navy-hover: #1c2834;
    --blue-soft: #e8f1fb;
    --blue-text: #24527a;
    --green-soft: #e8f5e7;
    --green-text: #2f6b36;
    --red-soft: #fdecea;
    --red-text: #8b2119;
    --success: rgba(0, 160, 44, 0.82);
    --warning: rgba(238, 194, 55, 0.9);
    --danger: rgba(220, 52, 42, 0.86);
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--page-bg);
    color: var(--text);
}

.container {
    max-width: 1180px;
    margin: 40px auto;
    padding: 20px;
}

.tasks-layout {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 16px;
    align-items: start;
}

.task-sidebar {
    position: sticky;
    top: 16px;
    display: grid;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: var(--shadow);
}

.side-section {
    display: grid;
    gap: 8px;
}

.assigned-course-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    padding: 10px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    line-height: 1.35;
}

.student-progress-panel {
    display: grid;
    gap: 10px;
}

.learning-progress {
    display: grid;
    gap: 7px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
}

.learning-progress-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-weight: 600;
}

.learning-progress-head span {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
}

.learning-progress-head strong {
    font-size: 13px;
    color: var(--text);
    text-align: right;
}

.learning-progress-track {
    height: 10px;
    overflow: hidden;
    border-radius: 999px;
    background: #e2e8f0;
}

.learning-progress-fill {
    display: block;
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #6aa84f, #8fcf74);
    transition: width 0.25s ease;
}

.learning-progress-fill.exam {
    background: linear-gradient(90deg, #24527a, #5d8fbd);
}

.learning-progress-detail {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.35;
}

.sidebar-controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    align-items: start;
}

.side-title {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
}

.level-selector {
    display: flex;
    gap: 4px;
    background: #e9eef4;
    padding: 4px;
    border-radius: 8px;
    margin-bottom: 14px;
    border: 1px solid var(--line);
}

.sidebar-levels {
    margin-bottom: 0;
    flex-direction: column;
}

.level-btn {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    line-height: 1.2;
    overflow-wrap: anywhere;
    transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.level-btn:hover {
    background: rgba(255,255,255,0.55);
    color: var(--text);
}

.level-btn.active {
    background: white;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
}

.source-list,
.mode-toggle,
.category-toggle,
.section-toggle {
    display: grid;
    gap: 6px;
}

.source-btn,
.mode-btn,
.category-btn,
.section-btn {
    width: 100%;
    border: 1px solid var(--line);
    background: white;
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition:
        background 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        box-shadow 0.2s ease;
}

.source-btn {
    display: grid;
    gap: 3px;
    padding: 10px 11px;
    text-align: left;
}

.source-btn small {
    color: var(--muted);
    font-size: 11px;
    font-weight: 400;
}

.mode-btn,
.category-btn,
.section-btn {
    min-height: 40px;
    padding: 9px 11px;
}

.source-btn:hover,
.mode-btn:hover,
.category-btn:hover,
.section-btn:hover {
    background: #f3f6fa;
    border-color: #b9c6d4;
}

.source-btn.active,
.mode-btn.active,
.category-btn.active,
.section-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.16);
}

.source-btn.active small {
    color: rgba(255,255,255,0.76);
}

.tag-search-input {
    width: 100%;
    min-height: 40px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    padding: 9px 11px;
}

.tag-search-input::placeholder {
    color: #94a3b8;
}

.tag-chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
}

.tag-chip,
.clear-tags-btn {
    border: 1px solid var(--line);
    border-radius: 999px;
    background: white;
    color: var(--text);
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.2;
    padding: 5px 8px;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
}

.tag-chip:hover,
.clear-tags-btn:hover {
    background: #f3f6fa;
    border-color: #b9c6d4;
}

.tag-chip.active {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
}

.tag-helper {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.4;
}

.clear-tags-btn {
    justify-self: start;
    color: var(--blue-text);
    border-color: #cfe0f2;
}

.task-card {
    background: var(--surface);
    border-radius: 8px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
}

.focus-toggle {
    position: fixed;
    right: 16px;
    top: 82px;
    z-index: 100;
    min-height: 42px;
    border: 1px solid var(--navy);
    border-radius: 999px;
    background: var(--navy);
    color: white;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    padding: 9px 14px;
    box-shadow: var(--shadow);
}

.focus-toggle:hover {
    background: var(--navy-hover);
    border-color: var(--navy-hover);
}

body.focus-mode {
    background: white;
}

body.focus-mode #nav,
body.focus-mode footer,
body.focus-mode .footer-contact,
body.focus-mode .task-sidebar {
    display: none;
}

body.focus-mode .container {
    max-width: 1240px;
    margin: 10px auto;
    padding: 10px;
}

body.focus-mode .focus-toggle {
    top: 16px;
}

body.focus-mode .tasks-layout {
    display: block;
}

body.focus-mode .task-card {
    padding: 24px;
}

.progress-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    min-height: 22px;
}

.tile {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    background: #d8dee6;
}

.tile.good {
    background: var(--success);
}

.tile.medium {
    background: var(--warning);
}

.tile.bad {
    background: var(--danger);
}

.top-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}

.timer,
.task-counter {
    border: 1px solid var(--line-dark);
    border-radius: 8px;
    padding: 9px 12px;
    font-weight: 600;
    background: white;
}

.timer.hidden {
    display: none;
}

.task-counter {
    margin-left: auto;
    color: var(--muted);
}

.meta-box {
    display: flex;
    align-items: center;
    border: 1px solid var(--line-dark);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
}

.meta-podstawowa {
    background: linear-gradient(90deg, #d5b8ea, #ffffff);
}

.meta-rozszerzona {
    background: linear-gradient(90deg, #d5b8ea, #ffffff);
}

.meta-osmoklasista {
    background: linear-gradient(90deg, #b2d699, #ffffff);
}

.meta-homework {
    background: linear-gradient(90deg, #d99595 0%, #e7b4b4 36%, #ffffff 100%);
}

.meta-section {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
}

.meta-section.task-title.homework {
    color: white;
}

.meta-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
}

.task-image-stack {
    display: grid;
    gap: 12px;
}

.task-image {
    width: 100%;
    height: auto;
    max-height: 450px;
    object-fit: contain;
    display: block;
    padding: 10px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.25s ease, transform 0.25s ease;
}

.task-image.hidden {
    display: none;
}

.context-image {
    max-height: 360px;
}

.task-image.fade-out {
    opacity: 0;
    transform: translateY(24px);
}

.interaction-panel {
    margin-top: 16px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
}

.task-actions {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    align-items: center;
    gap: 10px;
}

.action-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.action-group.tools {
    justify-content: flex-start;
}

.action-group.navigation {
    justify-content: center;
}

.action-group.check {
    justify-content: flex-end;
}

button {
    font-family: inherit;
}

.action-btn,
.choice-btn {
    min-height: 40px;
    border: 1px solid transparent;
    padding: 9px 13px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition:
        background 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.2s ease;
}

.action-btn:hover,
.choice-btn:hover {
    transform: translateY(-1px);
}

.action-btn:focus-visible,
.choice-btn:focus-visible,
.level-btn:focus-visible,
.source-btn:focus-visible,
.mode-btn:focus-visible,
.category-btn:focus-visible,
.section-btn:focus-visible,
.tag-chip:focus-visible,
.clear-tags-btn:focus-visible,
.tag-search-input:focus-visible {
    outline: 3px solid rgba(88, 101, 242, 0.25);
    outline-offset: 2px;
}

.action-btn:disabled,
.choice-btn:disabled {
    cursor: not-allowed;
    transform: none;
    opacity: 0.72;
}

.action-btn.tool {
    background: white;
    color: var(--blue-text);
    border-color: #cfe0f2;
}

.action-btn.tool:hover {
    background: var(--blue-soft);
    border-color: #b8d3ee;
}

.action-btn.answer {
    background: white;
    color: var(--green-text);
    border-color: #cce5c9;
}

.action-btn.answer:hover {
    background: var(--green-soft);
    border-color: #b8d9b4;
}

.action-btn.review {
    background: white;
    color: #765a12;
    border-color: #edd88c;
}

.action-btn.review:hover {
    background: #fff4cf;
    border-color: #e3bd41;
}

.action-btn.nav {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
    min-width: 124px;
}

.action-btn.nav:hover {
    background: var(--navy-hover);
    border-color: var(--navy-hover);
}

.action-btn.success {
    background: var(--green-soft);
    color: var(--green-text);
    border-color: #cce5c9;
}

.action-btn.danger {
    background: var(--red-soft);
    color: var(--red-text);
    border-color: #efc6c2;
}

.action-btn.success:hover {
    background: #dff0dd;
    border-color: #b8d9b4;
}

.action-btn.danger:hover {
    background: #f9ddd9;
    border-color: #e8b5af;
}

.result-buttons {
    display: none;
}

.result-buttons.active {
    display: flex;
}

.mcq {
    display: none;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
}

.mcq.active {
    display: grid;
}

.choice-btn {
    min-height: 48px;
    background: white;
    color: var(--text);
    border-color: var(--line);
    font-size: 16px;
    line-height: 1.2;
    white-space: normal;
}

.choice-btn:hover {
    background: #f3f6fa;
    border-color: #b9c6d4;
}

.choice-btn.correct {
    background: #dff3e4;
    border-color: var(--success);
    color: #20592b;
}

.choice-btn.wrong {
    background: #fde5e2;
    border-color: var(--danger);
    color: #8b2119;
}

.choice-btn.selected {
    background: #e8f1fb;
    border-color: #8eb5de;
    color: var(--blue-text);
}

.mcq.true-false {
    grid-template-columns: 1fr;
}

.tf-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) repeat(2, minmax(80px, 120px));
    gap: 8px;
    align-items: stretch;
}

.tf-label {
    display: flex;
    align-items: center;
    min-height: 48px;
    padding: 9px 13px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    color: var(--muted);
    font-weight: 600;
}

.box {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: white;
    border: 1px solid var(--line);
    border-left: 4px solid #8eb5de;
    border-radius: 8px;
    white-space: pre-line;
    color: var(--text);
}

footer {
    text-align: center;
    padding: 15px;
    background: #1f2a36;
    color: #aaa;
    margin-top: 40px;
}

@media(max-width: 760px) {
    .container {
        margin: 24px auto;
        padding: 5px;
    }

    .task-card {
        padding: 16px;
    }

    .tasks-layout {
        grid-template-columns: 1fr;
    }

    .task-sidebar {
        position: static;
        padding: 12px;
    }

    .focus-toggle {
        position: static;
        display: block;
        width: calc(100% - 10px);
        margin: 8px auto 10px;
        border-radius: 8px;
    }

    body.focus-mode .focus-toggle {
        position: sticky;
        top: 5px;
        width: calc(100% - 10px);
        margin: 5px auto 8px;
    }

    body.focus-mode .container {
        margin: 0 auto;
        padding: 5px;
    }

    body.focus-mode .task-card {
        padding: 12px;
    }

    .level-selector {
        flex-direction: column;
    }

    .task-actions {
        grid-template-columns: 1fr;
        justify-items: center;
    }

    .action-group.tools,
    .action-group.navigation,
    .action-group.check {
        justify-content: center;
    }

    .action-group {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .action-group.result-buttons {
        display: none;
    }

    .action-group.result-buttons.active {
        display: flex;
    }

    .action-btn {
        min-width: min(160px, 100%);
    }

    .mcq {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .tf-row {
        grid-template-columns: minmax(0, 1fr) repeat(2, minmax(56px, 72px));
        gap: 6px;
    }

    .tf-label {
        min-height: 42px;
        padding: 8px 10px;
        font-size: 13px;
    }

    .task-image-stack {
        gap: 10px;
    }

    .task-image {
        padding: 6px;
    }

    .context-image {
        max-height: 340px;
    }

    .meta-box {
        flex-direction: column;
        align-items: stretch;
        margin-bottom: 8px;
    }

    .meta-section {
        padding: 6px 10px;
        font-size: 12px;
        line-height: 1.2;
    }

    .meta-right {
        margin-left: 0;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        flex-wrap: wrap;
    }

    .meta-right .meta-section {
        padding-top: 4px;
    }

    .meta-right .meta-section:first-child {
        flex: 1 1 auto;
        min-width: 0;
    }

    .meta-right .meta-section:last-child {
        flex: 0 0 auto;
        white-space: nowrap;
    }

    .task-counter {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<div id="nav"></div>

<button class="focus-toggle" id="focusToggle" type="button" onclick="toggleFocusMode()">Tryb skupienia</button>

<div class="container">

    <div class="tasks-layout">
        <aside class="task-sidebar" aria-label="Ustawienia zadań">
            <div class="side-section">
                <div class="side-title">Poziom</div>
                <div class="level-selector sidebar-levels" id="guestLevelSection">
                    <button class="level-btn active" data-level="matura_podstawowa" onclick="setLevel(this,'matura_podstawowa')">Matura podstawowa</button>
                    <button class="level-btn" data-level="matura_rozszerzona" onclick="setLevel(this,'matura_rozszerzona')">Matura rozszerzona</button>
                    <button class="level-btn" data-level="egzamin_osmoklasisty" onclick="setLevel(this,'egzamin_osmoklasisty')">Egzamin Ósmoklasisty</button>
                </div>
            </div>

            <div class="side-section" id="tagSearchSection">
                <div class="side-title">Tagi</div>
                <input class="tag-search-input" id="tagSearchInput" type="search" placeholder="Szukaj tagu, np. funkcje" oninput="setTagSearch(this.value)">
                <div class="tag-chip-list" id="tagChipList"></div>
                <button class="clear-tags-btn" id="clearTagsButton" type="button" onclick="clearTagFilters()" hidden>Wyczyść tagi</button>
                <div class="tag-helper" id="tagHelper">Wybierz tag albo wpisz fragment nazwy.</div>
            </div>

            <div class="side-section" id="progressSection">
                <div class="side-title">Postęp ucznia</div>
                <div class="student-progress-panel" aria-live="polite">
                    <div class="learning-progress">
                        <div class="learning-progress-head">
                            <span>Kurs</span>
                            <strong id="courseProgressLabel">0 / 20 lekcji</strong>
                        </div>
                        <div class="learning-progress-track">
                            <span class="learning-progress-fill" id="courseProgressFill"></span>
                        </div>
                        <div class="learning-progress-detail" id="courseProgressDetail">Wczytywanie postępu...</div>
                    </div>

                    <div class="learning-progress">
                        <div class="learning-progress-head">
                            <span>Egzaminy</span>
                            <strong id="examProgressLabel">0 / 20 arkuszy</strong>
                        </div>
                        <div class="learning-progress-track">
                            <span class="learning-progress-fill exam" id="examProgressFill"></span>
                        </div>
                        <div class="learning-progress-detail" id="examProgressDetail">Wczytywanie postępu...</div>
                    </div>
                </div>
            </div>

            <div class="side-section" id="assignedCourseSection">
                <div class="side-title">Przypisany kurs</div>
                <div class="assigned-course-card" id="assignedCourseName">Sprawdzam kurs ucznia...</div>
            </div>

            <div class="side-section" id="categorySection">
                <div class="side-title">Materiał</div>
                <div class="category-toggle">
                    <button class="category-btn active" data-category="kurs" onclick="setCategory(this,'kurs')">Kurs</button>
                    <button class="category-btn" data-category="egzaminy" onclick="setCategory(this,'egzaminy')">Egzaminy</button>
                </div>
            </div>

            <div class="side-section" id="modeSection" style="display:none">
                <div class="side-title">Tryb</div>
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="ordered" onclick="setMode(this,'ordered')">Po kolei</button>
                    <button class="mode-btn" data-mode="random" onclick="setMode(this,'random')">Losowo</button>
                </div>
            </div>

            <div class="side-section">
                <div class="side-title" id="sourceTitle">Numer lekcji</div>
                <div class="source-list" id="sourceList"></div>
            </div>

            <div class="side-section" id="coursePartSection">
                <div class="side-title">Zakres</div>
                <div class="section-toggle" id="coursePartList"></div>
            </div>
        </aside>

        <div class="task-card">

            <div class="progress-grid" id="progress"></div>

            <div class="top-row">

async function loadAssignedCourse(){
    if(!window.apiFetch){
        isLoggedInStudent = false;
        loggedUser = null;
        setTimerVisible(true);
        updateAssignedCourseName();
        return;
    }

    try {
        const session = await apiFetch("/api/auth/me");

        if(!session.authenticated){
            isLoggedInStudent = false;
            loggedUser = null;
            setTimerVisible(true);
            updateAssignedCourseName();
            return;
        }

        isLoggedInStudent = true;
        loggedUser = session.user || null;

        if(session.user?.level){
            selectedLevel = session.user.level;
        }

        selectedCategory = "kurs";
        taskMode = "ordered";
        setTimerVisible(false);
        updateAssignedCourseName(session.user);
    } catch(error) {
        if(error.redirecting) throw error;

        if(error.status === 401){
            isLoggedInStudent = false;
            loggedUser = null;
            setTimerVisible(true);
            updateAssignedCourseName();
            return;
        }

        isLoggedInStudent = false;
        loggedUser = null;
        setTimerVisible(true);
        updateAssignedCourseName();

function loadTaskSource(sourceConfig){
    const sourceMeta = getSourceMeta(sourceConfig);
    const source = sourceMeta.path;

    return fetch(source)
    .then(r => {
        if(!r.ok) throw new Error("Nie udało się wczytać listy zadań.");
        return r.json();
    })
    .then(items => {
        const basePath = source.slice(0, source.lastIndexOf("/") + 1);

        return items.map(task => ({
            ...task,
            path: basePath + task.file,
            contextPath: task.contextFile ? basePath + task.contextFile : null,
            tags: normalizeTaskTags(task),
            category: sourceMeta.category,
            coursePart: task.coursePart || task.section || "zadania",
            level: task.level || sourceMeta.level,
            sourceId: sourceMeta.id,
            sourceLabel: sourceMeta.label,
            sourceDetail: sourceMeta.detail
        }));
    });
}

function getSourceMeta(sourceConfig){
    const source = typeof sourceConfig === "string" ? sourceConfig : sourceConfig.path;
    const parts = source.split("/");
    const category = typeof sourceConfig === "string" ? "egzaminy" : sourceConfig.category || "egzaminy";
    const isCourse = category === "kurs";
    const type = isCourse ? parts[2] : parts[1];
    const year = parts[2];
    const month = parts[3];
    const label = sourceConfig.label || SOURCE_TYPE_LABELS[type] || "Zestaw";
    const detail = sourceConfig.detail || `${year} / ${MONTH_LABELS[month] || month} / CKE`;

    return {
        id: source,
        path: source,
        category,
        level: sourceConfig.level || SOURCE_LEVELS[type],
        label,
        detail
    };
}

function normalizeTag(tag){
    return String(tag || "")
        .trim()
        .replace(/\s+/g, " ")
        .toLocaleLowerCase("pl-PL");
}

function normalizeTaskTags(task){
    const explicitTags = Array.isArray(task.tags) ? task.tags : [];
    const fallbackTags = explicitTags.length ? [] : [task.topic];
    const unique = new Map();

    [...explicitTags, ...fallbackTags]
        .map(tag => String(tag || "").trim())
        .filter(Boolean)
        .forEach(tag => {
            unique.set(normalizeTag(tag), tag);
        });

    return [...unique.values()];
}

function taskMatchesTagFilters(task){
    if(isLoggedInStudent || selectedCategory !== "egzaminy") return true;

    const tags = (task.tags || []).map(normalizeTag).filter(Boolean);
    const term = normalizeTag(tagSearchTerm);
    const activeTags = [...selectedTags];

    if(activeTags.length && !activeTags.every(tag => tags.includes(tag))) return false;
    if(term && !tags.some(tag => tag.includes(term))) return false;

    return true;
}

function getTagBaseTasks(){
    return tasks.filter(task =>
        task.category === "egzaminy" &&
        task.level === selectedLevel &&
        (selectedSource === "all" || task.sourceId === selectedSource)
    );
}

function getAvailableTags(){
    const map = new Map();

    getTagBaseTasks().forEach(task => {
        (task.tags || []).forEach(tag => {
            const key = normalizeTag(tag);

            if(key && !map.has(key)){
                map.set(key, tag);
            }
        });
    });

    return [...map.entries()]
        .map(([key, label]) => ({ key, label }))
        .sort((a, b) => a.label.localeCompare(b.label, "pl"));
}

function pruneSelectedTags(availableTags){
    const availableKeys = new Set(availableTags.map(tag => tag.key));

    selectedTags.forEach(tag => {
        if(!availableKeys.has(tag)){
            selectedTags.delete(tag);
        }
    });
}

function renderTagSearch(){
    const section = document.getElementById("tagSearchSection");
    const input = document.getElementById("tagSearchInput");
    const list = document.getElementById("tagChipList");
    const clearButton = document.getElementById("clearTagsButton");
    const helper = document.getElementById("tagHelper");

    if(!section || !input || !list || !clearButton || !helper) return;

    const shouldShow = !isLoggedInStudent && selectedCategory === "egzaminy";

    section.style.display = shouldShow ? "grid" : "none";

    if(!shouldShow) return;

    input.value = tagSearchTerm;
    list.innerHTML = "";

    const availableTags = getAvailableTags();
    pruneSelectedTags(availableTags);

    const term = normalizeTag(tagSearchTerm);
    const visibleTags = availableTags
        .filter(tag => !term || tag.key.includes(term))
        .slice(0, 18);

    if(!availableTags.length){
        helper.innerText = "Wybrany arkusz nie ma jeszcze tagów w pliku JSON.";
    } else if(!visibleTags.length){
        helper.innerText = "Nie ma tagu pasującego do wpisanego tekstu.";
    } else {
        helper.innerText = "Wybierz tag albo wpisz fragment nazwy.";
    }

    visibleTags.forEach(tag => {
        const button = document.createElement("button");

        button.type = "button";
        button.className = selectedTags.has(tag.key) ? "tag-chip active" : "tag-chip";
        button.innerText = tag.label;
        button.onclick = () => toggleTagFilter(tag.key);

        list.appendChild(button);
    });

    clearButton.hidden = !selectedTags.size && !tagSearchTerm;
}

function setTagSearch(value){

function toggleTagFilter(tag){
    if(selectedTags.has(tag)){
        selectedTags.delete(tag);
    } else {
        selectedTags.add(tag);
    }

    resetSession();
    renderTagSearch();
    drawTask(getInitialIndex());
}

function clearTagFilters(){

}

function getSourceMetaById(sourceId){
    return TASK_SOURCES.map(getSourceMeta).find(source => source.id === sourceId);
}

function getAvailableSources(){
    return TASK_SOURCES
        .map(getSourceMeta)
        .filter(source =>
            source.category === selectedCategory &&
            source.level === selectedLevel &&
            tasks.some(t =>
                t.sourceId === source.id &&
                t.category === selectedCategory &&
                t.level === selectedLevel
            )
        );
}

function ensureSelectedSource(){
    const availableSources = getAvailableSources();

    if(selectedCategory === "kurs"){
        if(!availableSources.some(source => source.id === selectedSource)){
            selectedSource = availableSources[0]?.id || "all";
        }

        return;
    }

    if(!isLoggedInStudent){
        if(!availableSources.some(source => source.id === selectedSource)){
            selectedSource = availableSources[0]?.id || "all";
        }

        return;
    }

    if(selectedSource !== "all" && !availableSources.some(source => source.id === selectedSource)){
        selectedSource = "all";
    }

}

function getProgressSourceId(item){
    if(item.source_id) return item.source_id;
    if(!item.task_id) return "";

    const splitIndex = item.task_id.lastIndexOf(":");

    return splitIndex > 0 ? item.task_id.slice(0, splitIndex) : "";
}

function getProgressFile(item){
    if(item.file) return item.file;
    if(!item.task_id) return "";

    const splitIndex = item.task_id.lastIndexOf(":");

    return splitIndex > 0 ? item.task_id.slice(splitIndex + 1) : "";
}

function progressTaskKey(item){
    const sourceId = getProgressSourceId(item);
    const file = getProgressFile(item);

    if(!sourceId || !file) return "";

    return `${sourceId}:${file}`;
}

function getTaskSources(category, level, options = {}){
    const sourceMap = new Map();

    tasks
        .filter(task =>
            task.category === category &&
            task.level === level &&
            (!options.coursePart || task.coursePart === options.coursePart)
        )
        .forEach(task => {
            if(!sourceMap.has(task.sourceId)){
                sourceMap.set(task.sourceId, {
                    id: task.sourceId,
                    label: task.sourceLabel,
                    detail: task.sourceDetail,
                    files: new Set()
                });
            }

            sourceMap.get(task.sourceId).files.add(task.file);
        });

    return [...sourceMap.values()]
        .map(source => ({
            ...source,
            totalTasks: source.files.size
        }))
        .filter(source => source.totalTasks > 0);
}

function calculateProgressStats(category, target, options = {}){
    const attemptedTasks = new Set(
        savedProgress
            .map(progressTaskKey)
            .filter(Boolean)
    );
    const sources = getTaskSources(category, selectedLevel, options);

    let completed = 0;
    let started = 0;
    let attempted = 0;
    let total = 0;
    let visualUnits = 0;

    sources.forEach(source => {
        const attemptedInSource = [...source.files]
            .filter(file => attemptedTasks.has(`${source.id}:${file}`))
            .length;

        total += source.totalTasks;
        attempted += attemptedInSource;

        if(attemptedInSource > 0) started++;

        if(attemptedInSource >= source.totalTasks){
            completed++;
            visualUnits++;
        } else if(source.totalTasks){
            visualUnits += attemptedInSource / source.totalTasks;
        }
    });

    return {
        target,
        completed,
        started,
        attempted,
        total,
        available: sources.length,
        percent: Math.min(100, Math.round((visualUnits / target) * 1000) / 10)
    };
}

function updateProgressBar({ labelId, fillId, detailId, label, unit, stats, emptyText, unavailableText }){
    const labelElement = document.getElementById(labelId);
    const fillElement = document.getElementById(fillId);
    const detailElement = document.getElementById(detailId);

    if(!labelElement || !fillElement || !detailElement) return;

    labelElement.innerText = `${stats.completed} / ${stats.target} ${unit}`;
    fillElement.style.width = `${stats.percent}%`;

    if(unavailableText){
        detailElement.innerText = unavailableText;
        return;
    }

    if(!stats.available){
        detailElement.innerText = emptyText;
        return;
    }

    detailElement.innerText =
        `${label}: dostępne ${stats.available}, rozpoczęte ${stats.started}, zadania ${stats.attempted}/${stats.total}`;
}

function renderLearningProgress(unavailableText = ""){
    const courseStats = calculateProgressStats("kurs", COURSE_TARGETS[selectedLevel] || 20, {
        coursePart: "praca_domowa"
    });
    const availableExamTasks = tasks.filter(task =>
        task.category === "egzaminy" &&
        task.level === selectedLevel
    ).length;
    const examStats = calculateProgressStats("egzaminy", Math.max(1, availableExamTasks));

    updateProgressBar({
        labelId: "courseProgressLabel",
        fillId: "courseProgressFill",
        detailId: "courseProgressDetail",
        label: "Prace domowe",
        unit: "lekcji",
        stats: courseStats,
        emptyText: "Brak dodanych prac domowych dla tego poziomu.",
        unavailableText
    });

    updateProgressBar({
        labelId: "examProgressLabel",
        fillId: "examProgressFill",
        detailId: "examProgressDetail",
        label: "Zadania egzaminacyjne",
        unit: "zadań",
        stats: examStats,
        emptyText: "Brak dodanych arkuszy dla tego poziomu.",
        unavailableText
    });
}

function resetSession(){
    currentIndex = 0;
    randomHistory = [];
    randomHistoryIndex = -1;
    seconds = 0;
    updateTimer();
    document.getElementById("progress").innerHTML = "";
}

function getInitialIndex(){
    const p = pool();

    if(!p.length) return 0;
    if(taskMode === "random") return randomIndex(p.length, -1);

    return 0;
}

function randomIndex(length, current){
    if(length <= 1) return 0;

    let index = current;

    while(index === current){
        index = Math.floor(Math.random() * length);
    }

    return index;
}

function rememberRandomIndex(index){
    if(taskMode !== "random") return;
    if(randomHistory[randomHistoryIndex] === index) return;

    randomHistory = randomHistory.slice(0, randomHistoryIndex + 1);
    randomHistory.push(index);
    randomHistoryIndex = randomHistory.length - 1;
}

function parseFile(file){
    const p = file.replace(".png","").split("_");

    const monthMap = {
        m: "maj",
        c: "czerwiec",
        pr: "próbna",
        s: "sierpień"
    };

    return `Zadanie ${p[0]} • ${p[1]} • ${monthMap[p[4]] || p[4]} • CKE`;
}

function taskLabel(task){
    return task.title || parseFile(task.file);
}

function stars(n){
    return "★".repeat(n) + "☆".repeat(5 - n);
}

function isClosedTask(task){
    if(["closed", "multi", "true_false"].includes(task.type)) return true;
    if(task.type === "closed" && Array.isArray(task.options)) return true;
    if(Array.isArray(task.answer) && task.answer.length) return true;

    return ["A", "B", "C", "D", "P", "F", "PP", "PF", "FP", "FF"].includes(task.answer);
}

function getOptions(task){
    if(Array.isArray(task.options)) return task.options;

    if(["P", "F"].includes(task.answer)) return ["P", "F"];
    if(["PP", "PF", "FP", "FF"].includes(task.answer)) return ["PP", "PF", "FP", "FF"];

    return ["A", "B", "C", "D"];
}

function usesTrueFalseLabels(task){
    if(!task) return false;
    if(task.type === "true_false") return true;
    if(task.type === "multi") return false;

    const options = Array.isArray(task.options) ? task.options : [];

    if(options.length > 0)
        return options.every(option => ["P", "F", "PP", "PF", "FP", "FF"].includes(option));

    return ["P", "F", "PP", "PF", "FP", "FF"].includes(task.answer);
}

function formatOption(option, task = null){
    if(!usesTrueFalseLabels(task) && ["P", "F"].includes(option)){
        return option;
    }

    const labels = {
        P: "Prawda",
        F: "Fałsz",
        PP: "Prawda / Prawda",
        PF: "Prawda / Fałsz",
        FP: "Fałsz / Prawda",
        FF: "Fałsz / Fałsz"
    };

    return labels[option] || option;
}

function formatAnswer(answer, task = null){
    if(Array.isArray(answer)){
        return answer.map(item => formatOption(item, task)).join(", ");
    }

    const formatted = formatOption(answer, task);

    if(formatted === answer) return answer;

    return `${answer} - ${formatted}`;
}

function getCorrectAnswers(task){
    if(Array.isArray(task.answer)) return task.answer.map(String);
    if(typeof task.answer === "string" && task.answer.includes(","))
        return task.answer.split(",").map(item => item.trim()).filter(Boolean);

    return [String(task.answer)];
}

function drawTask(index = currentIndex, trackHistory = true){
    const p = pool();

    if(!p.length){
        currentTask = null;
        document.getElementById("taskCounter").innerText = "0 / 0";
        document.getElementById("taskImage").src = "";
        document.getElementById("contextImage").src = "";
        document.getElementById("contextImage").classList.add("hidden");
        document.getElementById("metaBox").innerHTML = "";
        document.getElementById("metaBox").classList.remove("meta-homework");
        document.getElementById("mcq").className = "mcq";
        document.getElementById("resultButtons").classList.remove("active");
        const tagSuffix = !isLoggedInStudent && (selectedTags.size || tagSearchTerm)
            ? " i wybranych tagów"
            : "";
        showMessage(`Brak zadań w części ${CATEGORY_LABELS[selectedCategory].toLowerCase()} dla wybranego poziomu${tagSuffix}.`);
        return;
    }

    if(index < 0) index = p.length - 1;
    if(index >= p.length) index = 0;

    currentIndex = index;
    currentTask = p[currentIndex];

    if(trackHistory){
        rememberRandomIndex(currentIndex);
    }

    const img = document.getElementById("taskImage");
    const contextImg = document.getElementById("contextImage");

    img.classList.add("fade-out");
    contextImg.classList.add("fade-out");

    setTimeout(() => {
        img.onerror = () => {
            showMessage("Nie udało się wczytać obrazka zadania.");
        };

        contextImg.onerror = () => {
            contextImg.classList.add("hidden");
            showMessage("Nie udało się wczytać informacji do zadania.");
        };

        if(currentTask.contextPath){
            contextImg.src = currentTask.contextPath;
            contextImg.classList.remove("hidden");
        } else {
            contextImg.removeAttribute("src");
            contextImg.classList.add("hidden");
        }

        img.src = currentTask.path;

        const taskCounter = document.getElementById("taskCounter");
        const metaBox = document.getElementById("metaBox");
        const isHomework = currentTask.coursePart === "praca_domowa";

        taskCounter.innerText = `${currentIndex + 1} / ${p.length}`;
        metaBox.classList.toggle("meta-homework", isHomework);

        metaBox.innerHTML =
        `
        <div class="meta-section task-title ${isHomework ? "homework" : ""}">
            ${taskLabel(currentTask)}
        </div>

        <div class="meta-right">
            <div class="meta-section">
                ${currentTask.topic}
            </div>

            <div class="meta-section">
                ${stars(currentTask.difficulty)}
            </div>
        </div>
        `;

        img.classList.remove("fade-out");
        contextImg.classList.remove("fade-out");

        hintUsed = false;
        answerShown = false;
        currentTaskAnswered = false;
        currentTaskStartedAt = Date.now();

        resetReviewButton();
        setupMCQ();
        updateAnswerTools();
        hideMessage();
    }, 200);
}

function nextTask(){
    const p = pool();

    if(!p.length) return;

    if(taskMode === "random"){
        if(randomHistoryIndex < randomHistory.length - 1){
            randomHistoryIndex++;
            drawTask(randomHistory[randomHistoryIndex], false);
            return;
        }

        drawTask(randomIndex(p.length, currentIndex));
        return;
    }

    currentIndex++;

    if(currentIndex >= p.length){
        currentIndex = 0;
    }

    drawTask(currentIndex);
}

function prevTask(){
    const p = pool();

    if(!p.length) return;

    if(taskMode === "random"){
        if(randomHistoryIndex > 0){
            randomHistoryIndex--;
            drawTask(randomHistory[randomHistoryIndex], false);
        }

        return;
    }

    currentIndex--;

    if(currentIndex < 0){
        currentIndex = p.length - 1;
    }

    drawTask(currentIndex);
}

function shouldIgnoreKeyboardNavigation(event){
    if(event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) return true;

    const target = event.target;
    const tagName = target?.tagName?.toLowerCase();

    return target?.isContentEditable || ["input", "textarea", "select"].includes(tagName);
}

function handleKeyboardNavigation(event){
    if(shouldIgnoreKeyboardNavigation(event)) return;

    if(event.key === "ArrowRight"){
        event.preventDefault();
        nextTask();
    }

    if(event.key === "ArrowLeft"){
        event.preventDefault();
        prevTask();
    }
}

document.addEventListener("keydown", handleKeyboardNavigation);

function setupMCQ(){
    const mcq = document.getElementById("mcq");
    const resultButtons = document.getElementById("resultButtons");

    mcq.innerHTML = "";
    mcq.className = "mcq";
    resultButtons.classList.remove("active");
    setResultButtonsEnabled(true);
    multiSelection = new Set();
    trueFalseSelection = [];

    if(isClosedTask(currentTask)){
        mcq.classList.add("active");

        if(currentTask.type === "true_false"){
            setupTrueFalseTask(mcq);
            return;
        }

        getOptions(currentTask).forEach(option => {
            const b = document.createElement("button");

            b.className = "choice-btn";
            b.dataset.value = option;
            b.innerText = formatOption(option, currentTask);
            b.onclick = () => choose(option, b);

            mcq.appendChild(b);
        });
    } else {
        mcq.classList.remove("active");
    }
}

function isCourseTask(task = currentTask){
    return task?.category === "kurs";
}

function updateAnswerTools(){
    const answerButton = document.getElementById("answerButton");
    const resultButtons = document.getElementById("resultButtons");
    const reviewButton = document.getElementById("reviewButton");

    if(!currentTask || !answerButton || !resultButtons) return;

    const isCourse = isCourseTask();
    const isClosed = isClosedTask(currentTask);

    answerButton.hidden = isCourse && isClosed;

    if(reviewButton){
        reviewButton.hidden = !isLoggedInStudent;
    }

    if(!isClosed && answerShown){
        resultButtons.classList.add("active");
    } else {
        resultButtons.classList.remove("active");
    }
}

function setResultButtonsEnabled(enabled){
    document.querySelectorAll("#resultButtons button")
        .forEach(button => {
            button.disabled = !enabled;
        });
}

function setupTrueFalseTask(mcq){
    const correctAnswers = getCorrectAnswers(currentTask);
    const labels = currentTask.statements?.length
        ? currentTask.statements
        : correctAnswers.map((_, index) => `Stwierdzenie ${index + 1}`);

    mcq.classList.add("true-false");
    trueFalseSelection = new Array(correctAnswers.length).fill(null);

    correctAnswers.forEach((_, index) => {
        const row = document.createElement("div");
        const label = document.createElement("div");

        row.className = "tf-row";
        label.className = "tf-label";
        label.innerText = labels[index] || `Stwierdzenie ${index + 1}`;

        row.appendChild(label);

        ["P", "F"].forEach(option => {
            const button = document.createElement("button");

            button.className = "choice-btn";
            button.dataset.index = String(index);
            button.dataset.value = option;
            button.innerText = formatOption(option, currentTask);
            button.onclick = () => chooseTrueFalse(index, option, button);

            row.appendChild(button);
        });

        mcq.appendChild(row);
    });
}

function choose(opt, btn){
    if(currentTaskAnswered) return;

    if(currentTask.type === "multi"){
        chooseMulti(opt, btn);
        return;
    }

    const correct = String(currentTask.answer);

    disableMCQ();

    if(opt === correct){
        btn.classList.add("correct");
        addProgress(hintUsed || answerShown ? "medium" : "good");

        setTimeout(() => {
            nextTask();
        }, 650);

        return;
    }

    btn.classList.add("wrong");
    revealCorrectAnswer([correct]);

    if(isCourseTask()){
        showCorrection([correct]);
        addProgress("bad");
        return;
    }

    addProgress("bad");

    setTimeout(() => {
        nextTask();
    }, 1200);
}

function chooseMulti(opt, btn){
    if(currentTaskAnswered) return;

    const correctAnswers = getCorrectAnswers(currentTask);

    if(multiSelection.has(opt)){
        multiSelection.delete(opt);
        btn.classList.remove("selected");
        return;
    }

    if(!correctAnswers.includes(opt)){
        disableMCQ();
        btn.classList.add("wrong");
        revealCorrectAnswer(correctAnswers);

        if(isCourseTask()){
            showCorrection(correctAnswers);
            addProgress("bad");
            return;
        }

        addProgress("bad");

        setTimeout(() => {
            nextTask();
        }, 1200);

        return;
    }

    multiSelection.add(opt);
    btn.classList.add("selected");

    if(multiSelection.size === correctAnswers.length){
        disableMCQ();
        revealCorrectAnswer(correctAnswers);
        addProgress(hintUsed || answerShown ? "medium" : "good");

        setTimeout(() => {
            nextTask();
        }, 850);
    }
}

function chooseTrueFalse(index, opt, btn){
    if(currentTaskAnswered) return;

    const row = btn.closest(".tf-row");

    row?.querySelectorAll(".choice-btn")
        .forEach(button => {
            button.classList.remove("selected");
        });

    btn.classList.add("selected");
    trueFalseSelection[index] = opt;

    if(trueFalseSelection.some(answer => !answer)) return;

    const correctAnswers = getCorrectAnswers(currentTask);
    const isCorrect = correctAnswers.every((answer, answerIndex) =>
        trueFalseSelection[answerIndex] === answer
    );

    disableMCQ();
    revealTrueFalseAnswers(correctAnswers);

    if(!isCorrect && isCourseTask()){
        showCorrection(correctAnswers);
        addProgress("bad");
        return;
    }

    addProgress(isCorrect && !(hintUsed || answerShown) ? "good" : isCorrect ? "medium" : "bad");

    setTimeout(() => {
        nextTask();
    }, isCorrect ? 850 : 1400);
}

function disableMCQ(){
    document.querySelectorAll("#mcq button")
        .forEach(b => {
            b.disabled = true;
        });
}

function revealCorrectAnswer(correctAnswers){
    document.querySelectorAll("#mcq button")
        .forEach(b => {
            if(correctAnswers.includes(b.dataset.value)){
                b.classList.add("correct");
            }
        });
}

function revealTrueFalseAnswers(correctAnswers){
    document.querySelectorAll("#mcq button")
        .forEach(button => {
            const index = Number(button.dataset.index);
            const value = button.dataset.value;
            const wasSelected = trueFalseSelection[index] === value;
            const isCorrect = correctAnswers[index] === value;

            if(isCorrect) button.classList.add("correct");
            if(wasSelected && !isCorrect) button.classList.add("wrong");
        });
}

function addProgress(type){
    if(currentTaskAnswered) return;

    currentTaskAnswered = true;

    const tile = document.createElement("div");

    tile.classList.add("tile", type);

    if(type === "good") tile.title = "Dobrze";
    if(type === "medium") tile.title = "Z pomocą";
    if(type === "bad") tile.title = "Źle";

    document.getElementById("progress")
        .appendChild(tile);

    saveProgress(type);
}

async function saveProgress(type){
    if(!isLoggedInStudent) return;
    if(!currentTask || !window.apiFetch) return;

    try {
        const data = await apiFetch("/api/progress", {
            method: "POST",
            body: JSON.stringify({
                task_id: `${currentTask.sourceId}:${currentTask.file}`,
                source_id: currentTask.sourceId,
                file: currentTask.file,
                level: currentTask.level,
                topic: currentTask.topic,
                difficulty: currentTask.difficulty,
                result: type,
                hint_used: hintUsed,
                answer_shown: answerShown,
                source_category: currentTask.category,
                task_mode: taskMode,
                duration_seconds: getCurrentTaskDurationSeconds()
            })
        });

        if(data?.progress){
            savedProgress.unshift(data.progress);
            renderLearningProgress();
        }
    } catch(error) {
        if(error.status !== 401){
            console.warn("Nie udało się zapisać postępu.", error);
        }
    }
}

function getCurrentTaskDurationSeconds(){
    if(!currentTaskStartedAt) return 0;

    const duration = Math.round((Date.now() - currentTaskStartedAt) / 1000);

    return Math.max(1, Math.min(duration, 4 * 60 * 60));
}

function finish(type){
    if(currentTaskAnswered) return;

    if(isCourseTask()){
        if(type === "bad"){
            showCorrection();
            setResultButtonsEnabled(false);
            addProgress("bad");
            return;
        }

        setResultButtonsEnabled(false);
        addProgress(hintUsed ? "medium" : "good");
        nextTask();
        return;
    }

    if(type === "good" && hintUsed){
        addProgress("medium");
    } else {
        addProgress(type);
    }

    nextTask();
}

function showHint(){
    if(!currentTask) return;

    hintUsed = true;

    showMessage(currentTask.hint || "Brak wskazówki.");
}

function showAnswer(){
    if(!currentTask) return;

    if(isCourseTask() && isClosedTask(currentTask)){
        showMessage("Najpierw podaj odpowiedź. Jeśli będzie błędna, pokażę poprawną odpowiedź ze wskazówką.");
        return;
    }

    answerShown = true;

    showMessage(formatAnswer(currentTask.answer, currentTask) || "Brak odpowiedzi.");

    if(!isClosedTask(currentTask)){
        document.getElementById("resultButtons").classList.add("active");
    }
}

function resetReviewButton(){
    const reviewButton = document.getElementById("reviewButton");

    if(!reviewButton) return;

    reviewButton.disabled = false;
    reviewButton.innerText = "Do omówienia";
}

async function markForReview(){
    if(!isLoggedInStudent) return;
    if(!currentTask || !window.apiFetch) return;

    const reviewButton = document.getElementById("reviewButton");

    if(reviewButton){
        reviewButton.disabled = true;
    }

    try {
        const data = await apiFetch("/api/review-tasks", {
            method: "POST",
            body: JSON.stringify({
                task_id: `${currentTask.sourceId}:${currentTask.file}`,
                source_id: currentTask.sourceId,
                file: currentTask.file,
                level: currentTask.level,
                topic: currentTask.topic,
                difficulty: currentTask.difficulty,
                title: taskLabel(currentTask),
                course_part: currentTask.coursePart || selectedCoursePart
            })
        });

        if(reviewButton){
            reviewButton.innerText = data?.created ? "Dodano do omówienia" : "Już na liście";
        }

        showMessage(data?.created
            ? "Dodałem to zadanie do listy do omówienia."
            : "To zadanie już czeka na omówienie.");
    } catch(error) {
        if(reviewButton){
            reviewButton.disabled = false;
            reviewButton.innerText = "Do omówienia";
        }

        showMessage("Nie udało się dodać zadania do omówienia. Spróbuj jeszcze raz.");
    }
}

function showCorrection(correctAnswers = null){
    answerShown = true;

    const correct = correctAnswers
        ? correctAnswers.map(answer => formatOption(answer, currentTask)).join(", ")
        : formatAnswer(currentTask.answer, currentTask);
    const hint = currentTask.hint || "Wróć do treści zadania i sprawdź, który warunek nie został spełniony.";

    showMessage(`Poprawna odpowiedź: ${correct}\n\nWskazówka: ${hint}`);
}

function showMessage(text){
    const box = document.getElementById("answer");

    box.style.display = "block";
    box.innerText = text;
}

function hideMessage(){
    const box = document.getElementById("answer");

    box.style.display = "none";
    box.innerText = "";
}
</script>
