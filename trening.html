<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/webp" href="img/logo3.png">
<link rel="shortcut icon" type="image/webp" href="img/logo3.png">
<link rel="apple-touch-icon" href="img/logo3.png">
<title>Trening szybkości</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<style>
:root {
    --page-bg: #f0f2f5;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --line: #d9e1ea;
    --text: #1f2a36;
    --muted: #64748b;
    --navy: #263545;
    --blue-soft: #e8f1fb;
    --blue-text: #24527a;
    --green-soft: #e8f5e7;
    --green-text: #2f6b36;
    --red-soft: #fdecea;
    --red-text: #8b2119;
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--page-bg);
    color: var(--text);
}

.training-page {
    width: min(1120px, calc(100% - 28px));
    margin: 22px auto 40px;
}

.training-shell {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 14px;
    align-items: start;
}

.training-panel,
.training-stage,
.history-panel,
.leaderboard-panel {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--surface);
    box-shadow: var(--shadow);
}

.training-panel {
    position: sticky;
    top: 12px;
    display: grid;
    gap: 12px;
    padding: 12px;
}

.panel-title,
.stat-label,
.history-title {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

.level-tabs,
.topic-list,
.round-controls {
    display: grid;
    gap: 7px;
}

.level-tabs {
    grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
}

.level-btn,
.topic-btn,
.control-btn,
.key-btn,
.secondary-btn {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    color: var(--text);
    cursor: pointer;
    font: inherit;
    font-weight: 700;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}

.level-btn,
.topic-btn {
    min-height: 38px;
    padding: 8px 10px;
    font-size: 12px;
    text-align: left;
}

.level-btn {
    text-align: center;
}

.level-btn.active,
.topic-btn.active {
    border-color: rgba(142, 181, 222, 0.9);
    background: var(--blue-soft);
    color: var(--blue-text);
}

.control-btn {
    min-height: 42px;
    padding: 10px 12px;
    background: var(--navy);
    color: white;
}

.secondary-btn {
    min-height: 38px;
    padding: 8px 10px;
    background: var(--surface-soft);
    color: var(--text);
}

.level-btn:hover,
.topic-btn:hover,
.control-btn:hover,
.secondary-btn:hover,
.key-btn:hover {
    transform: translateY(-1px);
    border-color: var(--blue-text);
}

.topic-settings {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    overflow: hidden;
}

.topic-settings summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    list-style: none;
    cursor: pointer;
    padding: 9px 10px;
}

.topic-settings summary::-webkit-details-marker {
    display: none;
}

.topic-settings[open] summary {
    border-bottom: 1px solid var(--line);
}

.topic-current {
    display: block;
    margin-top: 2px;
    color: var(--text);
    font-size: 13px;
    font-weight: 800;
    line-height: 1.2;
}

.topic-summary-action {
    border-radius: 999px;
    background: white;
    border: 1px solid var(--line);
    color: var(--blue-text);
    flex: 0 0 auto;
    font-size: 11px;
    font-weight: 800;
    padding: 5px 8px;
}

.topic-settings .topic-list {
    padding: 8px;
}

.training-stage {
    display: grid;
    gap: 14px;
    padding: 16px;
}

.stage-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.stage-title {
    margin: 0;
    font-size: 24px;
    line-height: 1.1;
}

.stage-subtitle {
    margin: 3px 0 0;
    color: var(--muted);
    font-size: 13px;
}

.status-pill {
    flex: 0 0 auto;
    border-radius: 999px;
    background: var(--surface-soft);
    border: 1px solid var(--line);
    padding: 7px 10px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
}

.status-pill.good {
    background: var(--green-soft);
    border-color: rgba(65, 150, 90, 0.28);
    color: var(--green-text);
}

.status-pill.bad {
    background: var(--red-soft);
    border-color: rgba(220, 52, 42, 0.24);
    color: var(--red-text);
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
}

.stat-card {
    display: grid;
    gap: 2px;
    min-height: 58px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    padding: 8px;
}

.stat-value {
    font-size: 19px;
    font-weight: 800;
    line-height: 1;
}

.problem-card {
    display: grid;
    gap: 14px;
    min-height: 218px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    padding: 18px;
}

.task-topic {
    color: var(--blue-text);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
}

.problem-text {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.16em;
    min-height: 72px;
    color: #111827;
    font-family: Arial, sans-serif;
    font-size: 42px;
    font-weight: 600;
    line-height: 1.18;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
    text-rendering: geometricPrecision;
}

.problem-text sup {
    font-size: 0.58em;
}

.math-expression {
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.18em;
    contain: layout style;
}

.math-token {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
}

.math-sup {
    align-items: flex-start;
    gap: 0.02em;
}

.math-sup sup,
.math-sub sub {
    font-size: 0.55em;
    line-height: 1;
}

.math-sub {
    align-items: flex-end;
    gap: 0.02em;
}

.frac {
    display: inline-grid;
    grid-template-rows: auto auto;
    align-items: center;
    min-width: 1.35em;
    line-height: 1;
    text-align: center;
    vertical-align: middle;
}

.frac > span {
    display: block;
    padding: 0 0.12em;
}

.frac .den {
    border-top: 0.07em solid currentColor;
    padding-top: 0.08em;
}

.sqrt {
    display: inline-flex;
    align-items: stretch;
    gap: 0.03em;
}

.sqrt-symbol {
    font-size: 1.08em;
    line-height: 1;
}

.sqrt-radicand {
    border-top: 0.06em solid currentColor;
    padding: 0.03em 0.12em 0;
}

.abs {
    display: inline-block;
    padding: 0 0.02em;
    white-space: nowrap;
}

.lim {
    display: inline-grid;
    grid-template-rows: auto auto;
    align-items: center;
    justify-items: center;
    line-height: 0.9;
    margin-right: 0.08em;
    vertical-align: middle;
}

.lim sub {
    font-size: 0.42em;
    line-height: 1;
}

.blank {
    display: inline-grid;
    place-items: center;
    min-width: 1.45em;
    min-height: 1.02em;
    margin: 0 0.03em;
    border: 0.06em solid rgba(142, 181, 222, 0.95);
    border-radius: 0.16em;
    background: white;
    color: var(--blue-text);
    font-family: 'Poppins', sans-serif;
    font-size: 0.88em;
    font-weight: 800;
}

.answer-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 94px 94px;
    gap: 8px;
}

.answer-input {
    width: 100%;
    min-height: 52px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font: inherit;
    font-size: 26px;
    font-weight: 800;
    text-align: center;
}

.answer-input:focus {
    border-color: var(--blue-text);
    outline: 3px solid rgba(142, 181, 222, 0.22);
}

.answer-input.good {
    border-color: rgba(65, 150, 90, 0.7);
    background: var(--green-soft);
}

.answer-input.bad {
    border-color: rgba(220, 52, 42, 0.7);
    background: var(--red-soft);
}

.submit-btn {
    border: 1px solid var(--navy);
    border-radius: 8px;
    background: var(--navy);
    color: white;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
}

.skip-btn {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-weight: 800;
}

.keypad {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
}

.key-btn {
    min-height: 50px;
    font-size: 20px;
    background: white;
}

.key-btn.action {
    background: var(--surface-soft);
    color: var(--muted);
    font-size: 15px;
}

.key-btn.enter {
    background: var(--green-soft);
    color: var(--green-text);
}

.history-panel {
    display: grid;
    gap: 10px;
    padding: 12px;
}

.history-list {
    display: grid;
    gap: 7px;
}

.history-item {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    padding: 7px 9px;
    font-size: 12px;
}

.history-item strong {
    color: var(--green-text);
}

.leaderboard-panel {
    display: grid;
    gap: 10px;
    padding: 12px;
}

.leaderboard-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
}

.leaderboard-scope {
    margin: 3px 0 0;
    color: var(--muted);
    font-size: 12px;
}

.leaderboard-refresh {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    color: var(--text);
    cursor: pointer;
    font: inherit;
    font-size: 12px;
    font-weight: 800;
    padding: 7px 9px;
}

.leaderboard-list {
    display: grid;
    gap: 7px;
}

.leaderboard-row {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) 64px 64px 64px;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    padding: 8px 9px;
    font-size: 12px;
}

.leaderboard-row.current {
    border-color: rgba(142, 181, 222, 0.9);
    background: var(--blue-soft);
}

.leaderboard-rank {
    color: var(--blue-text);
    font-weight: 900;
}

.leaderboard-name {
    min-width: 0;
    overflow: hidden;
    color: var(--text);
    font-weight: 800;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.leaderboard-stat {
    color: var(--muted);
    font-weight: 700;
    text-align: right;
}

.leaderboard-stat strong {
    color: var(--text);
    display: block;
    font-size: 14px;
    line-height: 1.1;
}

.leaderboard-empty {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-soft);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    padding: 10px;
}

@media (max-width: 880px) {
    .training-shell {
        grid-template-columns: 1fr;
    }

    .training-panel {
        position: static;
    }

    .topic-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}

@media (max-width: 560px) {
    .training-page {
        width: min(100% - 18px, 1120px);
        margin-top: 12px;
    }

    .training-stage {
        padding: 10px;
    }

    .stage-head {
        align-items: flex-start;
        flex-direction: column;
    }

    .stats-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .problem-card {
        min-height: 190px;
        padding: 12px;
    }

    .problem-text {
        min-height: 62px;
        font-size: 32px;
    }

    .answer-row {
        grid-template-columns: 1fr;
    }

    .submit-btn,
    .skip-btn {
        min-height: 44px;
    }

    .topic-list {
        grid-template-columns: 1fr;
    }

    .leaderboard-head {
        flex-direction: column;
    }

    .leaderboard-row {
        grid-template-columns: 30px minmax(0, 1fr) 54px 54px;
    }

    .leaderboard-stat.streak {
        display: none;
    }
}
</style>
</head>

<body>
<div id="nav"></div>

<main class="training-page">
    <div class="training-shell">
        <aside class="training-panel" aria-label="Ustawienia treningu">
            <div>
                <div class="panel-title">Poziom</div>
                <div class="level-tabs" id="levelTabs"></div>
            </div>

            <details class="topic-settings">
                <summary>
                    <span>
                        <span class="panel-title">Tryb</span>
                        <strong class="topic-current" id="topicCurrent">Mieszany</strong>
                    </span>
                    <span class="topic-summary-action">Tematy</span>
                </summary>
                <div class="topic-list" id="topicList"></div>
            </details>

            <div class="round-controls">
                <button class="control-btn" id="startButton" type="button">Start rundy</button>
                <button class="secondary-btn" id="resetButton" type="button">Reset</button>
            </div>
        </aside>

        <section class="training-stage" aria-label="Trening szybkości">
            <div class="stage-head">
                <div>
                    <h1 class="stage-title">Trening szybkości</h1>
                    <p class="stage-subtitle" id="stageSubtitle">Egzamin ósmoklasisty</p>
                </div>
                <div class="status-pill" id="statusPill">Gotowy</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Czas</span>
                    <strong class="stat-value" id="timeLeft">120</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Poprawne</span>
                    <strong class="stat-value" id="correctCount">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Błędy</span>
                    <strong class="stat-value" id="mistakeCount">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Seria</span>
                    <strong class="stat-value" id="streakCount">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Śr.</span>
                    <strong class="stat-value" id="averageTime">-</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Rekord</span>
                    <strong class="stat-value" id="bestScore">0</strong>
                </div>
            </div>

            <div class="problem-card">
                <div class="task-topic" id="taskTopic">Mieszany</div>
                <div class="problem-text" id="problemText">Kliknij Start</div>
                <div class="answer-row">
                    <input class="answer-input" id="answerInput" type="text" inputmode="decimal" autocomplete="off" aria-label="Odpowiedź">
                    <button class="submit-btn" id="submitButton" type="button">OK</button>
                    <button class="skip-btn" id="skipButton" type="button">Pomiń</button>
                </div>
                <div class="keypad" id="keypad" aria-label="Klawiatura numeryczna"></div>
            </div>

            <div class="history-panel">
                <div class="history-title">Ostatnie</div>
                <div class="history-list" id="historyList"></div>
            </div>

            <div class="leaderboard-panel" aria-live="polite">
                <div class="leaderboard-head">
                    <div>
                        <div class="history-title">Ranking uczniów</div>
                        <p class="leaderboard-scope" id="leaderboardScope"></p>
                    </div>
                    <button class="leaderboard-refresh" id="leaderboardRefreshButton" type="button">Odśwież</button>
                </div>
                <div class="leaderboard-list" id="leaderboardList"></div>
            </div>
        </section>
    </div>
</main>

<script>
const ROUND_SECONDS = 120;
const MIXED_DIFFICULTIES = [2, 3, 4];
const MIXED_DIFFICULTY = "mixed";
const BEST_SCORE_KEY = "deltaSigmaSpeedTrainingBest";
const TASK_MEMORY_KEY = "deltaSigmaSpeedTrainingTaskMemory";
const TASK_MEMORY_LIMITS = { eo: 600, mp: 500, mr: 600 };
const TASK_RETRY_LIMIT = 160;

const LEVELS = {
    eo: {
        label: "Egzamin ósmoklasisty",
        shortLabel: "Egzamin ósmoklasisty",
        topics: [
            { id: "all", label: "Mieszany" },
            { id: "roots", label: "Pierwiastki" },
            { id: "fractions", label: "Ułamki zwykłe" },
            { id: "approximations", label: "Przybliżenia" },
            { id: "units", label: "Zamiana jednostek" },
            { id: "percents", label: "Procenty" },
            { id: "divisibility", label: "Cechy podzielności" },
            { id: "clock", label: "Zegar" },
            { id: "areas", label: "Pola figur" },
            { id: "volume", label: "Objętość" },
            { id: "motion", label: "Prędkość, czas, droga" }
        ]
    },
    mp: {
        label: "Matura podstawowa",
        shortLabel: "Matura podstawowa",
        topics: [
            { id: "all", label: "Mieszany" },
            { id: "powers", label: "Potęgi" },
            { id: "roots", label: "Pierwiastki" },
            { id: "logs", label: "Logarytmy" },
            { id: "functions", label: "Funkcje" }
        ]
    },
    mr: {
        label: "Matura rozszerzona",
        shortLabel: "Matura rozszerzona",
        topics: [
            { id: "all", label: "Mieszany" },
            { id: "derivatives", label: "Pochodne" },
            { id: "limits", label: "Granice" },
            { id: "trig", label: "Trygonometria" },
            { id: "absolute", label: "Wartość bezwzględna" },
            { id: "advanced_functions", label: "Funkcje" }
        ]
    }
};

const state = {
    level: "eo",
    topic: "all",
    difficulty: MIXED_DIFFICULTY,
    currentDifficulty: 3,
    roundSeconds: ROUND_SECONDS,
    running: false,
    finished: false,
    roundEndsAt: 0,
    timerId: null,
    currentTask: null,
    answerLocked: false,
    taskStartedAt: 0,
    correct: 0,
    mistakes: 0,
    streak: 0,
    bestStreak: 0,
    bestScore: 0,
    totalAnswerTime: 0,
    reviewTopic: "",
    history: [],
    seenTaskKeys: new Set(),
    taskMemory: []
};

const levelTabs = document.getElementById("levelTabs");
const topicCurrent = document.getElementById("topicCurrent");
const topicList = document.getElementById("topicList");
const stageSubtitle = document.getElementById("stageSubtitle");
const statusPill = document.getElementById("statusPill");
const timeLeft = document.getElementById("timeLeft");
const correctCount = document.getElementById("correctCount");
const mistakeCount = document.getElementById("mistakeCount");
const streakCount = document.getElementById("streakCount");
const averageTime = document.getElementById("averageTime");
const bestScore = document.getElementById("bestScore");
const taskTopic = document.getElementById("taskTopic");
const problemText = document.getElementById("problemText");
const answerInput = document.getElementById("answerInput");
const submitButton = document.getElementById("submitButton");
const skipButton = document.getElementById("skipButton");
const startButton = document.getElementById("startButton");
const resetButton = document.getElementById("resetButton");
const keypad = document.getElementById("keypad");
const historyList = document.getElementById("historyList");
const leaderboardScope = document.getElementById("leaderboardScope");
const leaderboardList = document.getElementById("leaderboardList");
const leaderboardRefreshButton = document.getElementById("leaderboardRefreshButton");

let leaderboardRequestId = 0;

const GENERATORS = [
    { level: "eo", topic: "roots", label: "Pierwiastki", make: genEoRootEquations },
    { level: "eo", topic: "roots", label: "Pierwiastki", make: genEoRootSimplify },
    { level: "eo", topic: "roots", label: "Pierwiastki", make: genEoRootCompare },
    { level: "eo", topic: "fractions", label: "Ułamki zwykłe", make: genEoFractionAdd },
    { level: "eo", topic: "fractions", label: "Ułamki zwykłe", make: genEoFractionCommonDenominator },
    { level: "eo", topic: "fractions", label: "Ułamki zwykłe", make: genEoFractionOfNumber },
    { level: "eo", topic: "fractions", label: "Ułamki zwykłe", make: genEoFractionMissingPart },
    { level: "eo", topic: "approximations", label: "Przybliżenia", make: genEoRootApproximation },
    { level: "eo", topic: "approximations", label: "Przybliżenia", make: genEoDecimalRounding },
    { level: "eo", topic: "approximations", label: "Przybliżenia", make: genEoApproximateProduct },
    { level: "eo", topic: "units", label: "Zamiana jednostek", make: genEoLengthUnitConversion },
    { level: "eo", topic: "units", label: "Zamiana jednostek", make: genEoMassUnitConversion },
    { level: "eo", topic: "units", label: "Zamiana jednostek", make: genEoAreaUnitConversion },
    { level: "eo", topic: "percents", label: "Procenty", make: genEoPercentOfNumber },

function rand(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function choice(items){
    return items[rand(0, items.length - 1)];
}

function blank(){
    return `<span class="blank">?</span>`;
}

function math(html){
    return `<span class="math-expression">${html}</span>`;
}

function token(value){
    return `<span class="math-token">${value}</span>`;
}

function sup(base, exponent){
    return `<span class="math-token math-sup"><span>${base}</span><sup>${exponent}</sup></span>`;
}

function sub(base, index){
    return `<span class="math-token math-sub"><span>${base}</span><sub>${index}</sub></span>`;
}

function logBase(base){
    return `<span class="math-token math-sub"><span>log</span><sub>${base}</sub></span>`;
}

function frac(numerator, denominator){
    return `<span class="frac"><span>${numerator}</span><span class="den">${denominator}</span></span>`;
}

function root(radicand){
    return `<span class="sqrt"><span class="sqrt-symbol">√</span><span class="sqrt-radicand">${radicand}</span></span>`;
}

function absExpr(value){
    return `<span class="abs">|${value}|</span>`;
}

function limitTo(target, body){
    return `<span class="lim"><span>lim</span><sub>x→${target}</sub></span>${body}`;
}

function parens(value){
    return `<span class="math-token">(${value})</span>`;
}

function signed(value){
    return value >= 0 ? `+ ${value}` : `- ${Math.abs(value)}`;
}

function coefficientTerm(value, variable){
    if(value === 1) return variable;
    if(value === -1) return `-${variable}`;

    return `${value}${variable}`;
}

function signedCoefficientTerm(value, variable){
    return value >= 0
        ? `+ ${coefficientTerm(value, variable)}`
        : `- ${coefficientTerm(Math.abs(value), variable)}`;
}

function factorial(n){
    let value = 1;

    for(let i = 2; i <= n; i++) value *= i;

    return value;
}

function combination(n, k){
    return factorial(n) / (factorial(k) * factorial(n - k));
}

function gcd(a, b){
    a = Math.abs(a);
    b = Math.abs(b);

    while(b){
        const next = a % b;
        a = b;
        b = next;
    }

    return a || 1;
}

function lcm(a, b){
    return Math.abs(a * b) / gcd(a, b);
}

function range(min, max){
    return Array.from({ length: max - min + 1 }, (_, index) => min + index);
}

function difficultyTier(){
    return state.currentDifficulty || 1;
}

function byDifficulty(values){
    return values[Math.min(values.length - 1, difficultyTier() - 1)];
}

function resolveTaskDifficulty(){
    return choice(MIXED_DIFFICULTIES);
}

function difficultyLabel(value = state.currentDifficulty){
    return "Mix";
}

function task(label, html, answer, meta = {}){
    return { label, html: math(html), answer, ...meta };
}

function taskMemoryLimit(){
    return TASK_MEMORY_LIMITS[state.level] || 500;
}

function readTaskMemoryStore(){
    try {
        const raw = localStorage.getItem(TASK_MEMORY_KEY);
        const parsed = raw ? JSON.parse(raw) : {};

        return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
    } catch(error) {
        return {};
    }
}

function loadTaskMemory(){
    const store = readTaskMemoryStore();
    const keys = Array.isArray(store[state.level]) ? store[state.level] : [];

    state.taskMemory = keys.slice(-taskMemoryLimit());
}

function saveTaskMemory(){
    const store = readTaskMemoryStore();

    store[state.level] = state.taskMemory.slice(-taskMemoryLimit());

    try {
        localStorage.setItem(TASK_MEMORY_KEY, JSON.stringify(store));
    } catch(error) {
        state.taskMemory = state.taskMemory.slice(-taskMemoryLimit());
    }
}

function rememberTaskKey(key){
    if(!key) return;

    state.taskMemory = state.taskMemory.filter(item => item !== key);
    state.taskMemory.push(key);

    if(state.taskMemory.length > taskMemoryLimit()){
        state.taskMemory = state.taskMemory.slice(-taskMemoryLimit());
    }

    saveTaskMemory();
}

function genEoPowerRules(){
    const base = choice(difficultyTier() >= 4 ? [2, 3, 5, 7, 10] : [2, 3, 5, 7]);
    const mode = rand(1, 4);
    const maxExp = byDifficulty([6, 8, 10, 12, 14]);

    if(mode === 1){
        const a = rand(2, maxExp);
        const b = rand(2, maxExp);
        return task("Potęgi", `${sup(base, a)} · ${sup(base, b)} = ${sup(base, blank())}`, a + b);
    }

    if(mode === 2){
        const b = rand(2, maxExp - 1);
        const answer = rand(2, maxExp);
        return task("Potęgi", `${sup(base, answer + b)} : ${sup(base, b)} = ${sup(base, blank())}`, answer);
    }

    if(mode === 3){
        const a = rand(2, byDifficulty([4, 5, 5, 6, 6]));
        const b = rand(2, byDifficulty([4, 4, 5, 5, 6]));
        return task("Potęgi", `${sup(parens(sup(base, a)), b)} = ${sup(base, blank())}`, a * b);
    }

    const exponent = rand(3, maxExp);
    const factor = rand(1, exponent - 1);
    return task("Potęgi", `${sup(base, factor)} · ${sup(base, blank())} = ${sup(base, exponent)}`, exponent - factor);
}

function genEoRootEquations(){

    if(mode === 1){

    }

    if(mode === 2){
        return task("Pierwiastki", `${root(rootValue * rootValue)} + ${blank()} = ${rootValue + add}`, add);
    }

    return task("Pierwiastki", `${root(rootValue * rootValue)} - ${blank()} = ${rootValue - add}`, add);
}

function genEoFractionAdd(){
    const denominators = [2, 3, 4, 5, 6, 8, 9, 10, 12, 15];
    let a;
    let b;
    let c;
    let d;
    let denominator;
    let numerator;

    for(let attempt = 0; attempt < 40; attempt++){
        b = choice(denominators);
        d = choice(denominators.filter(item => item !== b));
        denominator = lcm(b, d);
        a = rand(1, b - 1);
        c = rand(1, d - 1);
        numerator = a * (denominator / b) + c * (denominator / d);

        if(denominator <= 60 && numerator < denominator) break;
    }

    return task("Ułamki zwykłe", `${frac(a, b)} + ${frac(c, d)} = ${frac(blank(), denominator)}`, numerator);
}

function genEoFractionMissingPart(){
    const denominators = [3, 4, 5, 6, 8, 9, 10, 12, 15];
    let firstNumerator;
    let firstDenominator;
    let missingDenominator;
    let missingNumerator;
    let resultNumerator;
    let resultDenominator;

    for(let attempt = 0; attempt < 40; attempt++){
        firstDenominator = choice(denominators);
        missingDenominator = choice(denominators.filter(item => item !== firstDenominator));
        resultDenominator = lcm(firstDenominator, missingDenominator);
        firstNumerator = rand(1, firstDenominator - 1);
        missingNumerator = rand(1, missingDenominator - 1);
        resultNumerator = firstNumerator * (resultDenominator / firstDenominator) +
            missingNumerator * (resultDenominator / missingDenominator);

        if(resultDenominator <= 60 && resultNumerator < resultDenominator) break;
    }

    return task("Ułamki zwykłe", `${frac(firstNumerator, firstDenominator)} + ${frac(blank(), missingDenominator)} = ${frac(resultNumerator, resultDenominator)}`, missingNumerator);
}

function genMpAverageMissingValue(){

    const average = rand(6, byDifficulty([14, 16, 18, 20, 22]));

    let knownSum = 0;

        const value = rand(3, byDifficulty([16, 18, 20, 22, 24]));

        values.push(value);
        knownSum += value;
    }

    const missing = average * count - knownSum;

    if(missing < 0 || missing > 40){
        return genMpAverageMissingValue();

    return task("Statystyka", `Średnia liczb: ${values.join(", ")}, ${blank()} wynosi ${average}`, missing);

function generatorPool(){
    const basePool = GENERATORS.filter(generator =>
        generator.level === state.level &&
        (state.topic === "all" || generator.topic === state.topic)
    );

    if(state.topic === "all" && state.reviewTopic && Math.random() < 0.45){
        const reviewPool = basePool.filter(generator => generator.topic === state.reviewTopic);

        if(reviewPool.length) return reviewPool;
    }

    return basePool;
}

function createTaskCandidate(generator){
    state.currentDifficulty = resolveTaskDifficulty();

    return {
        ...generator.make(),
        topicId: generator.topic,
        difficulty: state.currentDifficulty
    };
}

function taskKey(taskItem){
    return [
        state.level,
        taskItem.topicId,
        String(taskItem.html).replace(/\s+/g, " "),
        String(taskItem.answer)
    ].join("|");
}

function nextTask(){
    const pool = generatorPool();
    const memoryIndex = new Map(state.taskMemory.map((key, index) => [key, index]));
    let selectedTask = null;
    let selectedKey = "";
    let staleTask = null;
    let staleKey = "";
    let staleRank = Number.POSITIVE_INFINITY;
    let repeatedTask = null;
    let repeatedKey = "";

    for(let attempt = 0; attempt < TASK_RETRY_LIMIT; attempt++){
        const candidate = createTaskCandidate(choice(pool));
        const key = taskKey(candidate);
        const seenInRound = state.seenTaskKeys.has(key);
        const seenInMemory = memoryIndex.has(key);

        if(!seenInRound && !seenInMemory){
            selectedTask = candidate;
            selectedKey = key;
            break;
        }

        if(!seenInRound){
            const rank = seenInMemory ? memoryIndex.get(key) : -1;

            if(rank < staleRank){
                staleTask = candidate;
                staleKey = key;
                staleRank = rank;
            }
        } else if(!repeatedTask){
            repeatedTask = candidate;
            repeatedKey = key;
        }
    }

    state.currentTask = selectedTask || staleTask || repeatedTask;
    const finalKey = selectedKey || staleKey || repeatedKey;

    if(finalKey){
        state.seenTaskKeys.add(finalKey);
        rememberTaskKey(finalKey);
    }

    state.answerLocked = false;
    state.taskStartedAt = performance.now();
    taskTopic.innerText = state.currentTask.label;
    problemText.innerHTML = state.currentTask.html;
    answerInput.value = "";
    answerInput.className = "answer-input";
    setStatus("Liczenie", "");
    answerInput.focus();
}

function normalizeAnswer(value){
    const normalized = String(value || "")
        .trim()
        .replace(",", ".");

    if(!normalized) return null;

    const numeric = Number(normalized);

    return Number.isFinite(numeric) ? numeric : null;
}

function isCorrectAnswer(value, expected){
    return Math.abs(value - expected) < 0.000001;
}

function submitAnswer(){
    if(!state.running || !state.currentTask || state.answerLocked) return;

    const value = normalizeAnswer(answerInput.value);

    if(value === null){
        markWrong();
        return;
    }

    if(isCorrectAnswer(value, state.currentTask.answer)){
        const elapsed = (performance.now() - state.taskStartedAt) / 1000;

        state.correct++;
        state.streak++;
        state.bestStreak = Math.max(state.bestStreak, state.streak);
        state.totalAnswerTime += elapsed;
        state.answerLocked = true;
        state.reviewTopic = "";
        answerInput.className = "answer-input good";
        setStatus(`Dobrze · ${elapsed.toFixed(1)} s`, "good");
        pushHistory(state.currentTask, elapsed);
        updateStats();

        setTimeout(() => {
            if(state.running) nextTask();
        }, 260);

        return;
    }

    markWrong();
}

function markWrong(){
    if(state.answerLocked) return;

    state.mistakes++;
    state.streak = 0;
    state.answerLocked = true;
    state.reviewTopic = state.currentTask?.topicId || "";
    answerInput.className = "answer-input bad";
    setStatus(`Wynik: ${formatAnswer(state.currentTask.answer)}`, "bad");
    updateStats();

    setTimeout(() => {
        if(state.running) nextTask();
    }, 650);
}

function skipTask(){
    if(!state.running || !state.currentTask || state.answerLocked) return;

    state.mistakes++;
    state.streak = 0;
    state.answerLocked = true;
    state.reviewTopic = state.currentTask.topicId || "";
    answerInput.className = "answer-input bad";
    setStatus(`Pominięto · ${formatAnswer(state.currentTask.answer)}`, "bad");
    updateStats();

    setTimeout(() => {
        if(state.running) nextTask();
    }, 450);
}

function pushHistory(taskItem, elapsed){
    state.history.unshift({
        label: taskItem.label,
        answer: taskItem.answer,
        time: elapsed
    });

    state.history = state.history.slice(0, 6);
    renderHistory();
}

function renderHistory(){
    historyList.innerHTML = "";

    if(!state.history.length){
        const empty = document.createElement("div");

        empty.className = "history-item";
        empty.innerHTML = `<span>Brak wyników</span><strong>-</strong>`;
        historyList.appendChild(empty);
        return;
    }

    state.history.forEach(item => {
        const row = document.createElement("div");

        row.className = "history-item";
        row.innerHTML = `<span>${item.label}</span><strong>${formatAnswer(item.answer)} · ${item.time.toFixed(1)} s</strong>`;
        historyList.appendChild(row);
    });
}

function formatAnswer(value){
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 1000) / 1000).replace(".", ",");
}

function escapeHtml(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function formatLeaderboardAverage(value){
    const numeric = Number(value);

    return Number.isFinite(numeric) && numeric > 0 ? `${numeric.toFixed(1)}s` : "-";
}

function bestScoreId(){
    return `${state.level}:${state.topic}:${state.difficulty}:${state.roundSeconds}`;
}

function getBestScores(){
    try {
        const raw = localStorage.getItem(BEST_SCORE_KEY);

        return raw ? JSON.parse(raw) : {};
    } catch(error) {
        return {};
    }
}

function loadBestScore(){
    const scores = getBestScores();

    state.bestScore = Number(scores[bestScoreId()] || 0);
}

function saveBestScore(){
    if(state.correct <= state.bestScore) return false;

    const scores = getBestScores();

    state.bestScore = state.correct;
    scores[bestScoreId()] = state.bestScore;

    try {
        localStorage.setItem(BEST_SCORE_KEY, JSON.stringify(scores));
    } catch(error) {
        return false;
    }

    return true;
}

function leaderboardScopeLabel(){
    return `${LEVELS[state.level].label} · ${activeTopicLabel()} · ${activeDifficultyLabel()} · ${state.roundSeconds}s`;
}

function leaderboardParams(){
    return new URLSearchParams({
        level: state.level,
        topic: state.topic,
        difficulty: String(state.difficulty),
        round_seconds: String(state.roundSeconds),
        limit: "10"
    });
}

function renderLeaderboardMessage(message){
    if(!leaderboardList) return;

    leaderboardList.innerHTML = `<div class="leaderboard-empty">${escapeHtml(message)}</div>`;
}

function renderLeaderboard(items){
    if(!leaderboardList) return;

    if(!items.length){
        renderLeaderboardMessage("Brak zapisanych wyników dla tego ustawienia.");
        return;
    }

    leaderboardList.innerHTML = items.map(item => `
        <div class="leaderboard-row${item.is_current_user ? " current" : ""}">
            <span class="leaderboard-rank">#${item.rank}</span>
            <span class="leaderboard-name" title="${escapeHtml(item.display_name)}">${escapeHtml(item.display_name || "Uczeń")}</span>
            <span class="leaderboard-stat"><strong>${Number(item.correct_count || 0)}</strong>pkt</span>
            <span class="leaderboard-stat"><strong>${Number(item.mistake_count || 0)}</strong>bł.</span>
            <span class="leaderboard-stat streak"><strong>${Number(item.best_streak || 0)}</strong>seria</span>
        </div>
    `).join("");
}

async function loadLeaderboard(){
    if(leaderboardScope){
        leaderboardScope.innerText = leaderboardScopeLabel();
    }

    if(!leaderboardList) return;

    if(!window.apiFetch || !window.getAuthToken || !window.getAuthToken()){
        renderLeaderboardMessage("Ranking działa po zalogowaniu ucznia.");
        return;
    }

    const requestId = ++leaderboardRequestId;

    renderLeaderboardMessage("Ładowanie rankingu...");

    try {
        const data = await window.apiFetch(`/api/speed-training/leaderboard?${leaderboardParams().toString()}`);

        if(requestId !== leaderboardRequestId) return;

        renderLeaderboard(Array.isArray(data?.leaderboard) ? data.leaderboard : []);
    } catch(error) {
        if(requestId !== leaderboardRequestId) return;

        renderLeaderboardMessage(error.status === 401
            ? "Ranking działa po zalogowaniu ucznia."
            : "Nie udało się pobrać rankingu.");
    }
}

async function saveSpeedTrainingResult(){
    if(!window.apiFetch || !window.getAuthToken || !window.getAuthToken()){
        loadLeaderboard();
        return;
    }

    const payload = {
        level: state.level,
        topic: state.topic,
        difficulty: String(state.difficulty),
        round_seconds: state.roundSeconds,
        correct_count: state.correct,
        mistake_count: state.mistakes,
        best_streak: state.bestStreak,
        average_time_seconds: state.correct ? state.totalAnswerTime / state.correct : 0
    };

    try {
        await window.apiFetch("/api/speed-training/results", {
            method: "POST",
            body: JSON.stringify(payload)
        });
    } catch(error) {
        console.warn("Nie udało się zapisać wyniku treningu.", error);
    } finally {
        loadLeaderboard();
    }
}

function setStatus(text, type){
    statusPill.innerText = text;
    statusPill.className = `status-pill${type ? ` ${type}` : ""}`;
}

function setTextIfChanged(element, value){
    const text = String(value);

    if(element.innerText !== text){
        element.innerText = text;
    }
}

function updateStats(){
    const remaining = state.running
        ? Math.max(0, Math.ceil((state.roundEndsAt - Date.now()) / 1000))
        : (state.finished ? 0 : state.roundSeconds);

    setTextIfChanged(timeLeft, remaining);
    setTextIfChanged(correctCount, state.correct);
    setTextIfChanged(mistakeCount, state.mistakes);
    setTextIfChanged(streakCount, state.streak);
    setTextIfChanged(averageTime, state.correct ? `${(state.totalAnswerTime / state.correct).toFixed(1)}s` : "-");
    setTextIfChanged(bestScore, state.bestScore);
}

function startRound(){
    stopTimer();
    state.running = true;
    state.finished = false;
    state.roundEndsAt = Date.now() + state.roundSeconds * 1000;
    state.correct = 0;
    state.mistakes = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.totalAnswerTime = 0;
    state.reviewTopic = "";
    state.history = [];
    state.seenTaskKeys.clear();
    loadTaskMemory();
    renderHistory();
    updateStats();
    nextTask();
    startButton.innerText = "Nowa runda";
    state.timerId = setInterval(tick, 200);
}

function tick(){
    const remaining = Math.max(0, Math.ceil((state.roundEndsAt - Date.now()) / 1000));

    setTextIfChanged(timeLeft, remaining);

    if(remaining <= 0){
        finishRound();
    }
}

function finishRound(){
    stopTimer();
    state.running = false;
    state.finished = true;
    state.currentTask = null;
    state.answerLocked = true;
    const isRecord = saveBestScore();
    problemText.innerHTML = "Koniec rundy";
    taskTopic.innerText = "Podsumowanie";
    answerInput.value = "";
    answerInput.className = "answer-input";
    setStatus(`${isRecord ? "Nowy rekord" : "Wynik"}: ${state.correct}, seria: ${state.bestStreak}`, "good");
    startButton.innerText = "Start rundy";
    updateStats();
    saveSpeedTrainingResult();
}

function resetRound(){
    stopTimer();
    loadBestScore();
    state.running = false;
    state.finished = false;
    state.currentTask = null;
    state.answerLocked = false;
    state.correct = 0;
    state.mistakes = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.currentDifficulty = resolveTaskDifficulty();
    state.totalAnswerTime = 0;
    state.reviewTopic = "";
    state.history = [];
    state.seenTaskKeys.clear();
    loadTaskMemory();
    problemText.innerHTML = "Kliknij Start";
    taskTopic.innerText = `${activeTopicLabel()} · ${activeDifficultyLabel()}`;
    answerInput.value = "";
    answerInput.className = "answer-input";
    setStatus("Gotowy", "");
    startButton.innerText = "Start rundy";
    renderHistory();
    updateStats();
    loadLeaderboard();
}

function stopTimer(){
    if(state.timerId){
        clearInterval(state.timerId);
        state.timerId = null;
    }
}

function setLevel(level){
    state.level = level;
    state.topic = "all";
    state.reviewTopic = "";
    renderControls();
    resetRound();
}

function setTopic(topic){
    state.topic = topic;
    state.reviewTopic = "";
    renderControls();
    resetRound();
}

function activeTopicLabel(){
    return LEVELS[state.level].topics.find(topic => topic.id === state.topic)?.label || "Mieszany";
}

function activeDifficultyLabel(){
    return "Mix";
}

function renderControls(){
    stageSubtitle.innerText = LEVELS[state.level].label;
    topicCurrent.innerText = activeTopicLabel();
    levelTabs.innerHTML = "";
    topicList.innerHTML = "";

    Object.entries(LEVELS).forEach(([id, level]) => {
        const button = document.createElement("button");

        button.type = "button";
        button.className = id === state.level ? "level-btn active" : "level-btn";
        button.innerText = level.shortLabel || level.label;
        button.onclick = () => setLevel(id);
        levelTabs.appendChild(button);
    });

    LEVELS[state.level].topics.forEach(topic => {
        const button = document.createElement("button");

        button.type = "button";
        button.className = topic.id === state.topic ? "topic-btn active" : "topic-btn";
        button.innerText = topic.label;
        button.onclick = () => setTopic(topic.id);
        topicList.appendChild(button);
    });

}

function appendKey(value){
    if(!state.running) return;

    answerInput.classList.remove("good", "bad");

    if(value === "backspace"){
        answerInput.value = answerInput.value.slice(0, -1);
    } else if(value === "clear"){
        answerInput.value = "";
    } else if(value === "minus"){
        answerInput.value = answerInput.value.startsWith("-")
            ? answerInput.value.slice(1)
            : `-${answerInput.value}`;
    } else if(value === "decimal"){
        if(!/[,.]/.test(answerInput.value)){
            answerInput.value += ",";
        }
    } else {
        answerInput.value += value;
    }

    answerInput.focus();
}

function renderKeypad(){
    const keys = [
        "7", "8", "9",
        "4", "5", "6",
        "1", "2", "3",
        "minus", "0", "decimal",
        "backspace", "clear", "enter"
    ];

    const labels = {
        minus: "+/-",
        decimal: ",",
        backspace: "Usuń",
        clear: "C",
        enter: "OK"
    };

    keypad.innerHTML = "";

    keys.forEach(key => {
        const button = document.createElement("button");

        button.type = "button";
        button.className = key === "enter"
            ? "key-btn enter"
            : ["backspace", "clear", "minus", "decimal"].includes(key)
                ? "key-btn action"
                : "key-btn";
        button.innerText = labels[key] || key;
        button.onclick = () => key === "enter" ? submitAnswer() : appendKey(key);
        keypad.appendChild(button);
    });
}

answerInput.addEventListener("input", () => {
    answerInput.value = answerInput.value.replace(/[^0-9,.\-]/g, "");
    answerInput.classList.remove("good", "bad");
});

answerInput.addEventListener("keydown", event => {
    if(event.key === "Enter"){
        event.preventDefault();
        submitAnswer();
    } else if(event.key === "Escape"){
        event.preventDefault();
        skipTask();
    }
});

submitButton.addEventListener("click", submitAnswer);
skipButton.addEventListener("click", skipTask);
startButton.addEventListener("click", startRound);
resetButton.addEventListener("click", resetRound);
leaderboardRefreshButton.addEventListener("click", loadLeaderboard);
window.addEventListener("load", loadLeaderboard);

renderControls();
renderKeypad();
resetRound();
</script>
